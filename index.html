<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ICT304 Concept Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600&family=Inter:wght@400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="bulma.min.css">
  <link rel="stylesheet" href="app.css">
</head>
<body>

  <div id="app-loading">
    <div class="loading-spinner"></div>
    <p>Loading knowledge base...</p>
  </div>

  <div class="app" id="app" style="display:none">

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar" role="navigation" aria-label="main navigation" id="app-navbar">
      <div class="navbar-brand">
        <a class="navbar-item app-title" href="#">ICT304 Concept Explorer</a>
        <button class="navbar-burger" id="navbar-burger" aria-label="menu" aria-expanded="false" data-target="navbar-menu">
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
        </button>
      </div>
      <div class="navbar-menu" id="navbar-menu">
        <div class="navbar-start">
          <div class="navbar-item">
            <div class="search-wrap">
              <input type="text" id="search-input" class="search-input"
                placeholder="Search... (press /)" autocomplete="off" spellcheck="false">
              <div class="search-results hidden" id="search-results"></div>
            </div>
          </div>
        </div>
        <div class="navbar-end">
          <div class="navbar-item">
            <div class="header-actions">
              <button id="btn-quiz" class="button is-primary is-small">Quiz Mode</button>
              <button id="btn-stats" class="button is-ghost">Stats</button>
              <button id="btn-help" class="button is-ghost" title="Keyboard shortcuts">?</button>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <!-- ===== BODY: SIDEBAR + MAIN ===== -->
    <div id="app-body">

      <!-- ===== SIDEBAR ===== -->
      <aside class="sidebar" id="app-sidebar">
        <div class="sidebar-inner">
          <nav class="module-list" id="module-list"></nav>
          <div class="sidebar-divider"></div>
          <div class="progress-section" id="progress-section"></div>
        </div>
      </aside>

      <!-- ===== MAIN CONTENT ===== -->
      <main class="main" id="main">
        <div id="concept-card"></div>
      </main>

    </div>

  </div>

  <div class="quiz-overlay hidden" id="quiz-overlay"></div>

  <script src="sql-wasm/sql-wasm.js"></script>
  <script src="app.js"></script>
</body>
</html>
