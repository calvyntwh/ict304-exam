<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ICT304 Concept Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600&family=Inter:wght@400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <style>
    /* ===== CSS CUSTOM PROPERTIES ===== */
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --primary: #6c8aff;
      --accent: #f5a623;
      --success: #4ade80;
      --danger: #f87171;
      --text: #e8eaf0;
      --text-secondary: #8b8fa8;
      --m1: #ff6b6b;
      --m2: #ffa94d;
      --m3: #ffd43b;
      --m4: #69db7c;
      --m5: #4dabf7;
      --m6: #da77f2;
      --font-heading: 'Crimson Pro', Georgia, serif;
      --font-body: 'Inter', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --radius: 12px;
      --sidebar-width: 220px;
      --header-height: 56px;
    }

    /* ===== BASE RESET + BODY + HTML ===== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 16px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      line-height: 1.7;
      min-height: 100vh;
    }

    /* ===== .app GRID LAYOUT ===== */
    .app {
      display: grid;
      grid-template-columns: var(--sidebar-width) 1fr;
      grid-template-rows: var(--header-height) 1fr;
      height: 100vh;
      overflow: hidden;
    }

    /* ===== .header STYLES ===== */
    .header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      gap: 16px;
      height: var(--header-height);
    }

    .app-title {
      font-family: var(--font-heading);
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ===== .sidebar STYLES ===== */
    .sidebar {
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 16px 0;
      background: var(--surface);
    }

    .sidebar-inner {
      display: flex;
      flex-direction: column;
    }

    .sidebar-divider {
      height: 1px;
      background: var(--border);
      margin: 12px 0;
    }

    /* ===== .main STYLES ===== */
    .main {
      overflow-y: auto;
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #concept-card {
      width: 100%;
      max-width: 720px;
    }

    /* ===== .btn BASE + VARIANTS ===== */
    .btn {
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-family: var(--font-body);
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn:hover {
      opacity: 0.85;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
    }

    .btn-ghost:hover {
      color: var(--text);
    }

    /* ===== .module-btn + .module-dot + .module-count ===== */
    .module-list {
      display: flex;
      flex-direction: column;
    }

    .module-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 16px;
      border: none;
      background: transparent;
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s;
    }

    .module-btn:hover {
      background: var(--bg);
    }

    .module-btn.active {
      background: var(--bg);
      color: var(--primary);
    }

    .module-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .module-count {
      margin-left: auto;
      color: var(--text-secondary);
      font-size: 12px;
    }

    /* ===== .progress-wrap + PROGRESS BAR STYLES ===== */
    .progress-section {
      padding: 12px 16px;
    }

    .progress-wrap {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .progress-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .progress-count {
      font-size: 13px;
      margin-bottom: 4px;
    }

    .progress-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 4px;
    }

    .progress-fill {
      height: 100%;
      background: var(--primary);
      transition: width 0.3s;
    }

    .progress-pct {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 10px;
    }

    .confidence-summary {
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .conf-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      display: inline-block;
    }

    /* ===== .concept-badge + .concept-topic ===== */
    .concept-header {
      margin-bottom: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .concept-header-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .concept-meta {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .concept-badge {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 100px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }

    .concept-topic {
      font-family: var(--font-heading);
      font-size: 28px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }

    /* ===== .layer + .layer-header + .layer-label + .layer-toggle + .layer-content ===== */
    .layers {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .layer {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .layer:hover {
      border-color: var(--primary);
    }

    .layer.revealed {
      border-color: var(--border);
    }

    .layer.revealed:hover {
      border-color: var(--border);
    }

    .layer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      cursor: pointer;
      user-select: none;
    }

    .layer-header:hover {
      background: rgba(255, 255, 255, 0.02);
    }

    .layer-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--primary);
    }

    .layer-toggle {
      font-size: 12px;
      color: var(--primary);
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 8px;
      border-radius: 4px;
      font-family: var(--font-body);
    }

    .layer-content {
      padding: 0 20px 16px;
      font-size: 16px;
      line-height: 1.8;
      color: var(--text);
      display: none;
    }

    .layer-content.expanded {
      display: block;
    }

    .layer-content code {
      font-family: var(--font-mono);
      font-size: 14px;
      background: var(--bg);
      padding: 1px 6px;
      border-radius: 4px;
    }

    /* ===== .exam-answer-section ===== */
    .exam-answer-section {
      margin-top: 4px;
    }

    .exam-answer-btn {
      display: block;
      width: 100%;
      padding: 12px 20px;
      font-size: 13px;
      font-family: var(--font-body);
      color: var(--accent);
      background: rgba(245, 166, 35, 0.08);
      border: 1px solid rgba(245, 166, 35, 0.3);
      border-radius: var(--radius);
      cursor: pointer;
      text-align: center;
      transition: background 0.2s, border-color 0.2s;
      letter-spacing: 0.02em;
    }

    .exam-answer-btn:hover {
      background: rgba(245, 166, 35, 0.14);
      border-color: var(--accent);
    }

    .exam-answer-content {
      display: none;
      margin-top: 12px;
      padding: 20px;
      background: var(--surface);
      border: 1px solid rgba(245, 166, 35, 0.25);
      border-radius: var(--radius);
      font-size: 15px;
      line-height: 1.8;
      color: var(--text);
    }

    .exam-answer-content.expanded {
      display: block;
    }

    /* ===== .diagram-section ===== */
    .diagram-section {
      margin-top: 12px;
    }

    .diagram-btn {
      display: block;
      width: 100%;
      padding: 10px 20px;
      font-size: 13px;
      font-family: var(--font-body);
      color: #6c5ce7;
      background: rgba(108, 92, 231, 0.08);
      border: 1px solid rgba(108, 92, 231, 0.3);
      border-radius: var(--radius);
      cursor: pointer;
      text-align: center;
      transition: background 0.2s, border-color 0.2s;
      letter-spacing: 0.02em;
    }

    .diagram-btn:hover {
      background: rgba(108, 92, 231, 0.14);
      border-color: #6c5ce7;
    }

    .diagram-content {
      display: none;
      margin-top: 12px;
      padding: 12px;
      background: var(--surface);
      border: 1px solid rgba(108, 92, 231, 0.25);
      border-radius: var(--radius);
      text-align: center;
    }

    .diagram-content.diagram-expanded {
      display: block;
    }

    .diagram-img {
      max-width: 100%;
      height: auto;
      border-radius: 6px;
      display: inline-block;
    }

    /* ===== .confidence-btn + selected states ===== */
    .confidence-row {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      margin-bottom: 24px;
      align-items: center;
      flex-wrap: wrap;
    }

    .confidence-btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: var(--font-body);
    }

    .confidence-btn:hover {
      border-color: var(--primary);
      color: var(--text);
    }

    .confidence-btn.selected.low {
      background: #7f1d1d;
      border-color: var(--accent);
      color: var(--accent);
    }

    .confidence-btn.selected.med {
      background: #713f12;
      border-color: var(--accent);
      color: var(--accent);
    }

    .confidence-btn.selected.high {
      background: #14532d;
      border-color: var(--success);
      color: var(--success);
    }

    /* ===== .card-nav + .nav-btn ===== */
    .card-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-top: 24px;
    }

    .nav-btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: var(--font-body);
    }

    .nav-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .nav-btn:disabled {
      opacity: 0.3;
      cursor: default;
    }

    /* ===== .quiz-overlay + .quiz-overlay.hidden + .quiz-card + .quiz-header ===== */
    .quiz-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 17, 23, 0.97);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 24px;
      overflow-y: auto;
    }

    .quiz-overlay.hidden {
      display: none;
    }

    .quiz-card {
      width: 100%;
      max-width: 720px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
    }

    .quiz-header {
      width: 100%;
      max-width: 720px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .quiz-progress-label {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .quiz-progress-bar {
      width: 200px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }

    .quiz-progress-fill {
      height: 100%;
      background: var(--primary);
      transition: width 0.3s ease;
      border-radius: 2px;
    }

    /* ===== .quiz-topic + .quiz-meta + .quiz-reveal-area + .quiz-answer + .quiz-complete ===== */
    .quiz-topic {
      font-family: var(--font-heading);
      font-size: 24px;
      color: var(--text);
      margin-bottom: 8px;
    }

    .quiz-meta {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 28px;
    }

    .quiz-reveal-area {
      text-align: center;
      padding: 24px 0;
    }

    .quiz-reveal-btn {
      padding: 14px 28px;
      border-radius: 8px;
      border: none;
      background: var(--primary);
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      font-family: var(--font-body);
      transition: opacity 0.15s;
    }

    .quiz-reveal-btn:hover {
      opacity: 0.85;
    }

    .quiz-answer {
      display: none;
    }

    .quiz-answer.visible {
      display: block;
    }

    .quiz-answer-text {
      font-size: 15px;
      line-height: 1.8;
      color: var(--text);
      margin-bottom: 20px;
    }

    .quiz-answer-text hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 20px 0;
    }

    .quiz-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .quiz-skip-btn {
      padding: 12px 20px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      font-size: 14px;
      cursor: pointer;
      font-family: var(--font-body);
    }

    .quiz-complete {
      text-align: center;
      padding: 48px;
      font-family: var(--font-heading);
    }

    .quiz-complete h2 {
      font-size: 28px;
      margin-bottom: 12px;
    }

    .quiz-complete p {
      color: var(--text-secondary);
      font-size: 16px;
      margin-bottom: 24px;
    }

    /* ===== .stat-* STYLES ===== */
    .stats-body {
      width: 100%;
      max-width: 720px;
    }

    .stat-modal-title {
      font-family: var(--font-heading);
      font-size: 22px;
    }

    .stat-cards {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
    }

    .stat-card-num {
      font-size: 32px;
      font-weight: 600;
    }

    .stat-card-label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .stat-modules {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
    }

    .stat-section-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    .stat-module-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      font-size: 13px;
    }

    .stat-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .stat-module-name {
      flex: 1;
    }

    .stat-count {
      color: var(--text-secondary);
    }

    .stat-low {
      color: var(--accent);
      font-size: 12px;
    }

    .stat-weak-spots {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }

    .stat-weak-item {
      display: flex;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      cursor: pointer;
      color: var(--primary);
    }

    .stat-weak-item:last-child {
      border-bottom: none;
    }

    .stat-weak-id {
      color: var(--text-secondary);
      flex-shrink: 0;
      min-width: 32px;
    }

    /* ===== .search-wrap + .search-input + .search-results ===== */
    .search-wrap {
      position: relative;
      flex: 1;
      max-width: 300px;
    }

    .search-input {
      width: 100%;
      padding: 8px 12px 8px 36px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      outline: none;
    }

    .search-input:focus {
      border-color: var(--primary);
    }

    .search-input::placeholder {
      color: var(--text-secondary);
    }

    .search-results {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      max-height: 320px;
      overflow-y: auto;
      z-index: 200;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }

    .search-results.hidden {
      display: none;
    }

    .search-result-item {
      padding: 10px 14px;
      font-size: 13px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }

    .search-result-item:last-child {
      border-bottom: none;
    }

    .search-result-item:hover,
    .search-result-item.focused {
      background: var(--bg);
    }

    .search-result-topic {
      color: var(--text);
      font-weight: 500;
      margin-bottom: 2px;
    }

    .search-result-meta {
      font-size: 11px;
      color: var(--text-secondary);
    }

    .search-no-results {
      padding: 12px 14px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    /* ===== .shortcuts-grid + .shortcut-row + .shortcut-key + .layer-guide ===== */
    .shortcuts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 20px;
    }

    .shortcut-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .shortcut-key {
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 3px 10px;
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 13px;
      min-width: 44px;
      text-align: center;
      color: var(--text);
    }

    .shortcut-desc {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .layer-guide {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }

    .layer-guide-row {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .layer-guide-row:last-child {
      margin-bottom: 0;
    }

    .layer-guide-num {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ===== @media (max-width: 768px) RESPONSIVE STYLES ===== */
    @media (max-width: 768px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: var(--header-height) auto 1fr;
      }

      .sidebar {
        border-right: none;
        border-bottom: 1px solid var(--border);
        overflow-x: auto;
        padding: 8px 16px;
      }

      .sidebar-inner {
        display: flex;
        gap: 8px;
        overflow-x: auto;
      }

      .sidebar-divider {
        width: 1px;
        height: auto;
        margin: 0 12px;
      }

      .progress-section {
        padding: 0;
      }

      .main {
        padding: 20px 16px;
      }

      .header {
        flex-wrap: wrap;
      }

      .app-title {
        font-size: 16px;
      }

      .header-actions {
        gap: 4px;
      }

      .btn {
        padding: 6px 12px;
        font-size: 13px;
      }

      .stat-cards {
        grid-template-columns: 1fr 1fr;
      }

      .shortcuts-grid {
        grid-template-columns: 1fr;
      }

      .concept-topic {
        font-size: 22px;
      }
    }

    /* ===== kbd STYLES ===== */
    kbd {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 6px;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text);
    }

    /* ===== MCQ PATTERN RECOGNITION ===== */
    .layers-locked .layer-row .reveal-btn {

hrough interaction with an environment.\n\nExamples: Email spam filters (trained on labelled emails), recommendation systems, image classifiers.\n\n**Deep Learning (DL)**\n\nDL is a specialised subset of ML that uses deep neural networks \u2014 networks with many hidden layers (hence \"deep\") \u2014 to learn hierarchical representations of data. The key difference from classical ML:\n- Classical ML: Features must be hand-engineered by domain experts, then a classifier is trained on those features.\n- Deep Learning: Features are learned automatically from raw data \u2014 the network learns hierarchical feature representations from pixels/characters up to abstract concepts.\n\nDeep networks excel at:\n- Learning from unstructured data (images, text, audio) without feature engineering\n- Scaling with data and compute (performance consistently improves with more data and larger models)\n- Transfer learning (pretrained models fine-tuned on small datasets)\n\nExamples: GPT/BERT (text), ResNet (image classification), AlphaFold (protein structure).\n\n**Timeline context:** ML emerged as a field in the 1980s, DL breakthroughs came in 2012 (ImageNet/CNN) and accelerated through the 2010s with GPU compute, big data, and transformer architectures (2017+). LLMs represent the current frontier of DL capability."

        "L5": "What is the Turing Test?\n\nThe Turing Test, proposed by Alan Turing in 1950 in his paper \"Computing Machinery and Intelligence,\" is a test for machine intelligence based on behavioural equivalence \u2014 if a machine can make a human evaluator believe they are talking to another human, the machine passes.\n\nHow the Test Works:\n1. A human evaluator conducts a text-based conversation with two hidden participants: a human and a machine\n2. The evaluator knows one is a machine and one is a human, but does not know which is which\n3. Communication is purely text-based (typed conversation) \u2014 no physical appearance or voice\n4. If the evaluator cannot reliably distinguish the machine from the human, the machine passes the test\n\nTuring's Original Formulation (Imitation Game):\nTuring described it as a party game with three players \u2014 Player A (machine), Player B (human), and Player C (interrogator). Player C must determine which player is the machine. The question is: will the machine play the imitation game well enough to fool the interrogator?\n\nWhy It Matters:\nThe test operationalises intelligence as behavioural equivalence rather than requiring a precise scientific definition. If you can't tell the difference conversationally, the machine is functionally intelligent on that dimension \u2014 regardless of the internal mechanism.\n\nWhat the Test Measures (and Doesn't Measure):\n- Measures: Ability to generate fluent, contextually appropriate, human-like responses\n- Does NOT measure: Genuine understanding, consciousness, reasoning, or semantic meaning\n- Does NOT require: The machine to actually \"think\" \u2014 only to behave as if it does\n\nHow to Pass the Test:\n- Natural language generation: responses must be grammatically correct and contextually relevant\n- Common sense reasoning: handling vague references, implied context, humour, emotion\n- Self-knowledge: consistent claims about personal history, beliefs, opinions\n- Handling un         "L5": "Describe the steps/stages of going from Data, Information, Knowledge, Intelligence.\n\nThe DIKI Pyramid describes the hierarchy from raw data to actionable intelligence \u2014 each level adds human interpretation and value. Moving up the pyramid requires increasingly sophisticated processing.\n\nLevel 1 \u2014 DATA\nRaw, unprocessed facts with no context or meaning assigned.\nCharacteristics: discrete, objective observations, no inherent meaning\nExample: The number 37.4, the string \"2024-03-15\", the coordinates (51.5\u00b0N, 0.1\u00b0W)\nProblem: Data alone tells you nothing \u2014 it's just symbols\n\nLevel 2 \u2014 INFORMATION\nData that has been processed, organised, and given context. Someone interprets the data and draws a conclusion.\nTransformation: data + processing + context = information\nExample: \"37.4\u00b0C is your body temperature reading from 8am today\" \u2014 now you know 37.4 has meaning (body temperature) and context (when, whose)\nExample: \"London, UK had an average temperature of 15.3\u00b0C on 2024-03-15\" \u2014 coordinates + date + processing = meaningful information\nProblem: Information tells you WHAT happened but not WHY or what to do about it\n\nLevel 3 \u2014 KNOWLEDGE\nInformation that has been analysed, contextualised, and understood in relation to existing knowledge. Patterns are recognised and relationships understood.\nTransformation: information + analysis + prior understanding = knowledge\nExample: \"37.4\u00b0C body temperature is slightly elevated (above normal 36.1-37.2\u00b0C), which could indicate mild fever or just natural variation\" \u2014 requires medical knowledge to interpret\nExample: \"15.3\u00b0C in London in March is slightly below the seasonal average of 16.1\u00b0C\" \u2014 requires knowledge of London's climate patterns to evaluate\nProblem: Knowledge tells you what something means in context, but not what action to take\n\nLevel 4 \u2014 INTELLIGENCE\nKnowledge that has been applied to make decisions, predictions, or take action. Intelligence is knowledge in action \u2014 it answers \"what should we do?\"\nTransformation: knowledge + goals + reasoning = intelligence\nExample: \"Based on the 37.4\u00b0C temperature, combined with your other symptoms (cough, fatigue), and your medical history, I recommend resting and monitoring \u2014 if temperature exceeds 38.5\u00b0C or symptoms worsen, see a doctor\"\nExample: \"Below-average London temperatures will affect tourism patterns \u2014 we should adjust seasonal staffing at attractions near the historical average, not this year's lower figure\"\n\nCritical Points About the DIKI Pyramid:\n\n1. It's NOT automatic: more data doesn't automatically lead to more intelligence \u2014 bad analysis at any stage corrupts everything downstream\n2. Information overload: organisations collect vast amounts of data and have some information, but struggle to convert it to actionable knowledge\n3. Intelligence without adaptability: AI systems that only encode current knowledge without mechanisms to update fail when the world changes \u2014 they're intelligent in a static sense but brittle in reality\n4. Knowledge work products: AI systems encode knowledge but applying it wisely (intelligence) still requires human judgment about goals and values\n5. The pyramid metaphor can mislead: real-world knowledge is not purely hierarchical \u2014 knowledge networks and graphs are more accurate representations"

        "L5": "What is a Large Language Model (LLM)? How is that related to Generative AI?\n\nA Large Language Model is a deep learning model \u2014 typically a transformer architecture trained on massive text corpora \u2014 that learns to predict the next token given a context window. The key properties are: scale (billions of parameters), self-supervised pretraining on next-token prediction, and emergent capabilities (reasoning, translation, summarisation) that appear at sufficient scale.\n\n**Architecture: The Transformer Foundation**\n\nLLMs are built on the transformer encoder-decoder architecture (Vaswani et al., 2017). The key components are:\n- Self-Attention: Each token attends to all other tokens in the sequence, capturing long-range dependencies. Query (Q), Key (K), and Value (V) projections compute attention weights: Attention(Q,K,V) = softmax(QK^T / \u221ad_k)V\n- Feed-Forward Layers: Position-wise MLPs between attention layers that learn feature combinations\n- Positional Encodings: Sinusoidal or learned embeddings that give the model token order information\n\n**Two dominant families:**\n1. **Encoder-only (BERT-style):** Bidirectional context, trained with masked language modelling (MLM). Good for classification, NER, sentence similarity. Example: BERT, RoBERTa.\n2. **Decoder-only (GPT-style):** Unidirectional (left-to-right), trained with causal language modelling (CLM). Good for generation tasks. Example: GPT-3, GPT-4, LLaMA, PaLM.\n\n**Relation to Generative AI:**\n\nGenerative AI is the broader field of models that create new content \u2014 text, images, code, audio, video. LLMs are a specific subset of generative AI that specialise in text generation. The relationship is:\n- Generative AI \u2192 Neural generative models \u2192 Large Language Models (text-specific)\n\nBeyond LLMs, generative AI also includes:\n- Diffusion models for images/videos (DALL-E, Stable Diffusion, Sora)\n- GANs for images, audio\n- Multimodal models (GPT-4V, Gemini) that dget-conscious weekly shoppers, (2) premium organic buyers, (3) weekday breakfast-only customers, (4) party planners with occasional large basket sizes, (5) convenience shoppers with small daily purchases. These segments were not known beforehand \u2014 they emerged from the data.\n\nExample \u2014 Undirected:\nMarket basket analysis: \"Customers who buy diapers also tend to buy beer\" \u2014 association rule mining discovers this relationship without being told to look for it. The retailer uses it to optimise store layout (place diapers near beer aisle) or for cross-selling recommendations.\n\nExample \u2014 Undirected:\nNetwork intrusion detection: analyse network traffic patterns to find anomalies \u2014 a cluster of traffic that looks different from normal (unusual port access, abnormal data volumes) may indicate an attack, even without knowing in advance what an attack looks like.\n\nKey Differences:\n| Aspect           | Directed (Supervised)              | Undirected (Unsupervised)                 |\n|-----------------|-------------------------------------|------------------------------------------|\n| Labels           | Required                            | Not required                             |\n| Goal             | Predict known outcome               | Discover unknown structure               |\n| What it finds    | Relationships between inputs and outputs | Natural groupings, associations, anomalies |\n| Example output  | Churn prediction score              | Customer segment assignments             |\n| Validation       | Compare predictions to known labels  | No ground truth to compare against       |\n| Risk             | Overfitting if labels are noisy      | May find spurious patterns (not actionable)|"

        "L4": "Optimizing an element without understanding its role in the system can harm overall performance \u2014 a star player can disrupt team coordination.",
        "L5": "What are systems, elements, and results?\n\nThese are three fundamental concepts in systems engineering.\n\nSYSTEM:\nA system is a complete, functioning whole \u2014 a set of elements that work together to achieve a common purpose. A system cannot be defined by a single element; it is defined by the relationships between elements and their collective purpose.\n- Example: A car is a system \u2014 not defined by the engine alone, or the wheels alone, but by all parts working together to provide transportation\n- Example: A healthcare system \u2014 hospitals, clinics, ambulance services, pharmaceutical suppliers, doctors, nurses \u2014 all working together to deliver healthcare\n\nProperties of a System:\n1. Emergence: The system as a whole has properties that none of its elements have individually \u2014 a car can drive, but an engine alone cannot\n2. Hierarchy: Every system is part of a larger system (a car is part of a transportation system; a transportation system is part of a city)\n3. Purpose: Every system has an intended purpose that justifies its existence\n\nELEMENTS:\nElements are the individual components that make up a system. Each element performs a specific function and may itself be a subsystem.\n- In a car: engine, transmission, wheels, steering system, braking system are all elements\n- In a healthcare system: hospitals, ambulances, pharmacies are all elements\n\nKey property: An element only makes sense in the context of the system it serves. A CPU is a remarkable engineering achievement in a computer context \u2014 but in a bicycle, it has no purpose.\n\nRESULTS:\nResults (or outputs/outcomes) are what the system produces \u2014 the consequences, products, or effects that the system creates in pursuit of its purpose.\n- In a car: transportation of people/goods from A to B is the result\n- In a healthcare system: improved health outcomes, disease prevention, emergency care are the results\n\nResults vs Outputs:\n- \"Output\" is the direct product of a system's process (a car produces exhaust gas, noise, heat)\n- \"Result\" is the broader consequence of the output in the context of the system's purpose (transportation enabling economic activity, family trips, emergency response)\n\nWhy These Distinctions Matter:\n- If you optimise an element without understanding its role in the system, you may harm overall system performance: a faster engine (element improvement) is useless if the braking system (another element) can't handle the increased speed\n- A star player (element) in the wrong system (basketball team playing chess) is worthless\n- Results measure whether the system achieved its purpose \u2014 not whether individual elements are optimal\n\nThe three concepts connect: Elements interact within a System to produce Results. Change one element and the results change. Understand the system first, then analyse elements."

        "L5": "What is an Architectural Design?\n\nArchitectural Design is a high-level description of a system's main elements, their interfaces, and their logical and physical layout. It serves as the blueprint from which detailed designs are developed.\n\nKey Components of Architectural Design:\n\n1. Main Elements\n   - Identifies all major subsystems, components, and their relationships\n   - Example: In a self-driving car \u2014 elements include the sensor subsystem, perception subsystem (computer vision), planning subsystem, and control subsystem\n\n2. Interfaces\n   - Defines how elements interact: data formats, protocols, timing\n   - Example: The perception subsystem sends object detection data to the planning subsystem via a defined API message format (e.g., bounding boxes with coordinates, confidence scores, object class)\n\n3. Logical Layout\n   - Describes the functional organisation without physical constraints\n   - Shows data flows, decision points, and processing stages\n   - Example: User request \u2192 Authentication \u2192 Feature Extraction \u2192 Model Inference \u2192 Response Formatting\n\n4. Physical Layout\n   - Specifies actual hardware, networks, deployment infrastructure\n   - Example: API server on Kubernetes cluster with 3 replicas, GPU node for inference, PostgreSQL database on dedicated instance\n\nArchitectural Design Process (from Topic 3 PDF):\n1. Identify the problem and constraints\n2. Define key architectural drivers (performance, security, cost, scalability)\n3. Generate architectural alternatives\n4. Evaluate alternatives against criteria (trade-off analysis)\n5. Document the chosen architecture\n6. Review and refine\n\nThe Architectural Design sits between the Concept of Operations (ConOps) and the detailed component design. It answers: \"What are the major building blocks and how do they fit together?\" \u2014 not \"how does each individual component work internally?\"\n\nCommon Architectural Patterns in ML Systems:\n- Microservices: Model deployed as independent service with REST/gRPC API\n- Monolithic: Model embedded directly in the application service\n- Serverless: Model invoked via stateless function (e.g., AWS Lambda)\n- Edge: Model runs on device (mobile, IoT) rather than in cloud"

        "L1": "You encounter ConOps Purpose in a real project. Here's how to think about it: - ConOps (Concept of Operations): A document that describes how a system will be used from the user's perspective.",
        "L2": "ConOps is a restaurant's service manual \u2014 how reservations work, how orders reach the kitchen, how complaints are handled, from the customer's view.",

        "L4": "Without ConOps, developers build based on assumptions about users. Users discover problems at deployment, not design time. ConOps validated only with stakeholders still misses real-world problems.",
        "L5": "What is ConOps? And why is this important?\n\nConOps (Concept of Operations) is a document that describes how a system will be used from the user's perspective \u2014 not from the technical design perspective. It answers: \"What will the system do, from the user's point of view?\"\n\nPurpose of ConOps:\n- Translates stakeholder needs into operational language\n- Describes who does what, when, where, how, and why\n- Catches gaps between user expectations and technical capability before design begins\n- Serves as a contract between the development team and the stakeholders\n\nContent of a ConOps Document:\n1. System Overview\n   - What the system is, who uses it, and its main purpose\n   - Example: \"Customer Support AI Agent \u2014 a chatbot that answers product questions 24/7 for customers on the company website\"\n\n2. User Profiles\n   - Who the users are and their characteristics\n   - Example: \"Customers with no technical training; Customer support staff who may override the AI\"\n\n3. Operational Scenarios\n   - Step-by-step descriptions of how users interact with the system in specific situations\n   - Example: Customer asks \"How do I reset my password?\" \u2192 System recognises intent \u2192 Looks up knowledge base \u2192 Returns formatted answer \u2192 Customer rates response as helpful/not helpful\n\n4. Support Environment\n   - How the system is monitored, maintained, and supported\n   - Example: Monitoring team uses Grafana dashboards to track AI response accuracy; weekly review of flagged conversations\n\nWhy ConOps is Important:\n- Without ConOps, developers build based on assumptions about users\n- Users discover problems at deployment, not design time \u2014 fixing at deployment is expensive\n- ConOps validated only with stakeholders still misses real-world problems \u2014 must test with actual users\n- It prevents building the right technical solution to the wrong user problem"

        "L1": "You encounter Interface Control Document in a real project. Here's how to think about it: - ICD (Interface Control Document): Defines how different systems or components interact (data, format, etc).",

        "L4": "Missing ICDs cause 'it works on my machine' failures. Ambiguous ICDs cause integration failures during system integration testing \u2014 the worst possible time.",
        "L5": "What is ICD used for?\n\nICD (Interface Control Document) defines how different systems or components interact \u2014 specifying data formats, protocols, timing, and responsibilities for each interface. It is the \"rulebook\" for inter-system communication.\n\nPurpose of ICD:\n- Ensures compatibility between subsystems built by different teams\n- Reduces integration problems during system assembly\n- Documents agreed-upon contracts so changes can be assessed for downstream impact\n- Prevents \"it works on my machine\" failures during system integration\n\nContents of an ICD:\n\n1. Interface Identification\n   - Unique ID for the interface (e.g., INT-PERCEPTION-PLANNING-001)\n   - Connected systems (e.g., Perception Subsystem \u2192 Planning Subsystem)\n\n2. Data Format Specification\n   - Message structure, field names, data types, units\n   - Example: \"ObjectDetectionMessage { bounding_box: [x_min, y_min, x_max, y_max], confidence: float (0-1), class_label: string, timestamp: ISO8601 }\"\n\n3. Protocol Definition\n   - Communication method (HTTP REST, gRPC, message queue, shared memory)\n   - Example: \"Data published to Kafka topic 'sensor-data' with Avro schema v2.3\"\n\n4. Timing and Performance\n   - Expected latency, throughput, update frequency\n   - Example: \"Perception \u2192 Planning latency must not exceed 50ms at 99th percentile\"\n\n5. Error Handling\n   - What happens when data is missing, malformed, or delayed\n   - Example: \"If no object detection received within 100ms, planning assumes empty scene and applies emergency stop\"\n\n6. Change Management\n   - How interface changes are communicated and versioned\n   - Example: \"Interface changes require sign-off from both Perception and Planning team leads\"\n\nExample: The Interface between a Camera (Perception) and Obstacle Detection (AI Model):\n- Data format: JPEG image at 30fps, resolution 1920\u00d71080\n- Protocol: ROS2 topic /camera/rgb/image_raw\n- Latency requirement: Image must reach model within 33ms of capture\n- Missing data: If 3 consecutive frames are missed, publish 'sensor failure' alert"

      "module": 3,
      "topic": "Hashed Feature Disadvantages",
      "layers": {
        "L1": "You encounter Hashed Feature Disadvantages in a real project. Here's how to think about it: What are the disadvantages of using Hashed Feature?",
        "L2": "It's like two different people accidentally getting the same phone number \u2014 calls get mixed up and nobody knows which person the call was really for.",
        "L3": "Hash collisions mean two different categories land in the same bucket \u2014 the model gets noisy mixed signals. And you can never reverse the hash to see what the original category was.",
        "L4": "Irreversible: you can never recover the original categories from the hash. Collisions corrupt feature representations. Fixed bucket count limits scalability \u2014 too few buckets means too many collisions.",
        "L5": "What are the disadvantages of using Hashed Features?\n\nHashed Feature Design is a technique for handling high-cardinality categorical features (e.g., user IDs, product IDs, URL strings) by mapping them to a fixed number of buckets using a hash function.\n\nDisadvantages:\n\n1. Hash Collisions \u2014 Two Different Categories Land in the Same Bucket\n\nA hash collision occurs when two different input values map to the same bucket index. This creates noisy features where the model receives a mixed signal \u2014 the feature value represents multiple distinct categories combined.\n\nExample:\n- Category \"Product_ABC123\" maps to bucket 47 (also maps to category \"Product_XYZ789\")\n- Category \"Product_XYZ789\" maps to bucket 47\n- The model sees bucket 47 as \"both products at once\" \u2014 it learns a combined pattern for both products that is meaningless for either individually\n\nConsequence: As the number of buckets decreases relative to the number of categories, collisions increase and model accuracy degrades. There is no recovery \u2014 you cannot determine which category a colliding bucket represents.\n\n2. Irreversibility \u2014 Cannot Recover Original Categories\n\nThe hash function is one-way: you can compute hash(input) but you cannot recover input from hash(input). The original categorical value is permanently lost.\n\nConsequence: You cannot use a hashed feature value to look up additional information about that category (e.g., \"what is the brand name for this product ID?\"). In production debugging, if a prediction is wrong for a specific product, you cannot identify which product it was from the hashed value alone.\n\n3. Fixed Bucket Count Limits Scalability\n\nThe number of buckets k must be set at design time. Choosing k:\n- Too small: many collisions, high noise\n- Too large: memory waste, sparsity reduces model's ability to learn\n\nConsequence: As the number of unique categories grows (e.g., new products added to catalog), the fixed bucket count becomes increasingly inadequate. A model deployed with 1,000 buckets for 10,000 products works well initially; with 1,000,000 products, collision rate becomes unmanageable.\n\n4. Cryptographic vs Non-Cryptographic Hash Functions\n\nNon-cryptographic hashes (e.g., MurmurHash, FarmHash) are fast but NOT collision-resistant \u2014 an adversary can intentionally craft inputs that all map to the same bucket, exploiting the model.\nCryptographic hashes (e.g., MD5, SHA-1) are slower but more uniform \u2014 but they are still irreversible.\n\n5. Feature Interactions Across Hashes Are Lost\n\nIf you hash two features separately (e.g., user_id and product_id), the model cannot learn cross-features (user_id X product_id interactions) because each is independently hashed into its own bucket space.\n\nMitigation Strategies:\n- Increase number of buckets to reduce collision probability: buckets = 2-4x number of unique categories\n- Use multiple hash functions and concatenate results (feature cross with hashed features)\n- For very high cardinality, use a two-stage approach: bloom filter to approximate membership, then full lookup for confirmed matches\n- Use learned embeddings instead of raw hashed features where possible"
      },

      "topic": "ML Data Considerations",
      "layers": {
        "L1": "You encounter ML Data Considerations in a real project. Here's how to think about it: What are the considerations of using data for machine learning?",
        "L2": "ML data is like cooking for guests \u2014 quality ingredients matter, you need enough food, it has to be edible, you can't serve things people are allergic to, and dietary restrictions must be respected.",
        "L3": "Quality garbage in means garbage out. Quantity must match model complexity. Relevance means training data must match deployment data. Bias in training data gets amplified by the model.",
        "L4": "Privacy violations expose the organization to legal risk. Label noise degrades model quality silently. Distribution mismatch between training and deployment makes even clean data useless.",
        "L5": "What are the considerations of using data for machine learning?\n\nHigh-quality data is the foundation of any ML system. Poor data quality is the most common cause of ML project failure. These considerations apply across the entire ML lifecycle from collection to production monitoring.\n\n**1. Data Quality**\n\nData must be accurate (correct values), complete (minimal missing values), consistent (same format across sources), and timely (reflects current reality). Dirty data produces dirty models.\n\nPractical issues: typos in customer databases, sensor drift causing measurement errors, outdated records that no longer reflect reality.\n\n**2. Data Quantity**\n\nML models \u2014 especially deep learning models \u2014 require large volumes of data to learn generalisable patterns. Too little data leads to overfitting (model memorises training examples rather than learning general patterns).\n\nRule of thumb: Deep learning typically requires thousands to millions of examples for good performance. For simpler classical ML (logistic regression, decision trees), hundreds to thousands may suffice depending on problem complexity.\n\nData augmentation (Topic 4) can artificially increase dataset size by applying label-preserving transformations (rotating images, paraphrasing text).\n\n**3. Data Relevance**\n\nThe data used for training must be representative of the problem the model will face in production. Training on historical data that differs from the target distribution leads to distribution shift (Topic 6).\n\nExample: A spam classifier trained on 2010 emails will perform poorly on 2024 spam because spam patterns (topics, language, tactics) evolve over time.\n\n**4. Data Bias and Fairness**\n\nBias in training data leads to biased models that systematically unfair to certain groups. Sources of bias:\n- Historical bias: Past decisions encoded in data reflect societal biases (hiring data from biased human decisions)\n- Representation bias: Some groups are underrepresented in the data\n- Measurement bias: Features used for prediction correlate with protected attributes\n\nFairness-aware ML (Topic 6) addresses detecting and mitigating these biases.\n\n**5. Privacy and Security**\n\nML models can memorise training data \u2014 this is a privacy risk, especially for sensitive data (medical records, personal messages). Techniques like differential privacy, federated learning, and data anonymisation help mitigate this.\n\nSecurity: adversarial attacks on training data (data poisoning), model inversion attacks extracting training data from model outputs.\n\n**6. Data Labelling (Annotation Quality)**\n\nFor supervised learning, labels must be accurate. Label noise (incorrect labels) directly degrades model performance. Inconsistent labelling across annotators is a common issue.\n\nInter-annotator agreement (measured by Cohen's Kappa or similar) quantifies labelling consistency.\n\n**7. Data Drift and Monitoring (Topic 4)**\n\nIn production, input data distributions shift over time (concept drift, covariate shift \u2014 Topic 6). Even with initially high-quality training data, deployed models degrade without monitoring and retraining pipelines.\n\n**Practical Exam Point:** For each consideration, be ready to give a concrete example of what can go wrong and how to detect/mitigate it."

      "layers": {
        "L1": "You encounter Row-Major vs Column-Major Format in a real project. Here's how to think about it: Explain the differences between Row-Major Versus Column-Major Format.",
        "L2": "Row-major is reading a book page by page from top to bottom. Column-major is reading one column at a time across pages \u2014 useful if you only care about specific words but need to flip around a lot.",
        "L3": "Row-major stores consecutive memory addresses for adjacent rows \u2014 fast for reading entire rows (like CSV processing). Column-major stores consecutive addresses for adjacent columns \u2014 fast for reading entire columns (like aggregations). The storage order determines cache performance for different access patterns.",
        "L4": "Using row-major storage for column-heavy analytics is slow \u2014 you're jumping around memory. Pandas uses row-major by default, which is why column-wise operations on large DataFrames are slower than expected.",
        "L5": "What is the difference between Row-Major and Column-Major data storage formats? Why does it matter for ML?\n\nThese are two different conventions for laying out two-dimensional arrays in computer memory. Understanding memory layout is critical for writing efficient ML code \u2014 accessing data in the wrong order causes cache misses that can slow computation by 10\u2013100x.\n\n**Memory Basics**\n\nComputer memory is a linear sequence of bytes. A 2D array (matrix) with R rows and C columns must be flattened into this linear sequence. The two conventions differ in which dimension is laid out contiguously.\n\n**Row-Major Order (C, C++, NumPy default)**\n\nIn row-major storage, elements within the same row are stored adjacently in memory. The memory address of element A[i][j] is computed as:\n> base_address + (i \u00d7 C + j) \u00d7 element_size\n\nThis means: traversing a row (left to right) is cache-friendly (sequential memory accesses). Traversing a column (top to bottom) jumps by C elements each time \u2014 inefficient for large C.\n\nNumPy arrays use row-major order by default.\n\n**Column-Major Order (Fortran, R, MATLAB)**\n\nIn column-major storage, elements within the same column are stored adjacently. The address of A[i][j] is:\n> base_address + (j \u00d7 R + i) \u00d7 element_size\n\nThis means: traversing a column is cache-friendly; traversing a row jumps by R elements.\n\n**Why It Matters for ML**\n\nMost ML operations are naturally column-oriented:\n- Feature vectors: each row is a data sample, each column is a feature. For a given feature across all samples, you need column access.\n- Matrix multiplication: Y = XW \u2014 computing Y[:,j] requires dot product of X's columns with W's rows.\n\nIf your ML framework (e.g., NumPy/C) stores data row-major but your algorithms access column-major, you get cache misses on every column access. BLAS libraries (OpenBLAS, MKL) are optimised for column-major operations, which is why MATLAB and R can be faster for matrix-heavy computations even on the same hardware.\n\n**ML Libraries:** PyTorch uses NCHW tensor format (channels-first) vs NHWC (channels-last) for similar cache/performance reasons on different hardware (CPU vs GPU). TensorFlow 2 adopted NHWC as default partly for this reason.\n\n**Practical Implication:** When implementing custom ML operations, be conscious of memory access patterns. Transposing a matrix (changing from row-major to column-major view) is not free \u2014 it requires a full memory copy. NumPy's .T gives a view (not a copy) but the underlying storage is still row-major."

        "L5": "What are the differences between Structured and Unstructured Data? Provide examples.\n\nThis distinction is fundamental to how data is stored, processed, and analysed in ML systems. Approximately 80\u201390% of enterprise data is estimated to be unstructured.\n\n**Structured Data**\n\nStructured data conforms to a predefined schema or data model \u2014 it is organised into tables with fixed rows and columns where each field has a defined data type. Because the schema is known in advance, structured data can be stored in traditional relational databases (SQL) and queried with declarative languages.\n\nProperties:\n- Schema-on-write: The structure is defined before data is inserted\n- Easy to search and aggregate using standard query languages\n- Each record has the same fixed set of attributes\n- Direct compatibility with statistical/ML tools that expect tabular input\n\nExamples:\n- Customer databases (CustomerID, Name, Email, PurchaseCount)\n- Financial transactions (TransactionID, Amount, Date, Category)\n- Sensor readings (Timestamp, SensorID, Temperature)\n- Spreadsheets, CSV files, SQL databases\n\n**Unstructured Data**\n\nUnstructured data has no predefined organisation or schema \u2014 it does not fit neatly into rows and columns. It accounts for the vast majority of real-world data and includes any data where the information content is not easily extractable via simple queries.\n\nProperties:\n- No enforced schema \u2014 the same type of entity can have very different representations\n- Cannot be stored in traditional relational databases without preprocessing\n- Requires specialised techniques to extract structure: NLP for text, computer vision for images, audio processing for speech\n- Often much richer in information content than structured data\n\nExamples:\n- Text: Emails, articles, social media posts, chat logs\n- Images: Photographs, medical scans, satellite imagery\n- Audio: Phone recordings, podcast episodes, music files\n- Video: Surveillance footage, YouTube videos, video calls\n- Documents: PDFs, Word files, web pages\n\n**Semi-Structured Data (bonus \u2014 worth knowing)**\n\nSits between the two: has some organisation (tags, hierarchy) but no rigid schema. Examples: JSON, XML, HTML, NoSQL databases, email headers.\n\n**ML Implications:**\n\nFor structured data: Can often use traditional ML (logistic regression, random forests) directly after minimal preprocessing.\n\nFor unstructured data: Almost always requires deep learning approaches \u2014 CNNs for images, RNNs/Transformers for text, CNNs for audio \u2014 because the raw representation is too high-dimensional and noisy for classical methods.\n\n**Data Readiness (Topic 4):** The Data Readiness Levels framework in Topic 4 specifically addresses structured data quality concerns \u2014\u6570\u636e\u7684\u51c6\u786e\u6027\u3001\u4e00\u81f4\u6027\u3001\u5b8c\u6574\u6027 are all measurable properties of structured datasets but not of unstructured ones."

        "L4": "Data lakes without governance become data swamps \u2014 raw data with no quality control, impossible to find anything useful. Data warehouses require expensive preprocessing before analysis. Both need clear governance or they become liabilities.",
        "L5": "What is Data Warehouse and Data Lake?\n\nData Warehouse: A centralised, structured repository for storing large volumes of historical data that has been processed, cleaned, and organised for analysis and reporting. Data is transformed into a predefined schema before storage (schema-on-write).\n\nData Lake: A centralised repository that stores raw data of any type \u2014 structured, semi-structured (JSON, logs), or unstructured (images, audio) \u2014 in its original format until it is needed (schema-on-read).\n\nKey Differences:\n\n| Aspect             | Data Warehouse                  | Data Lake                          |\n|--------------------|---------------------------------|-------------------------------------|\n| Data Type          | Structured, processed            | Raw: structured, semi, unstructured |\n| Schema             | Schema-on-write (predefined)     | Schema-on-read (defined at query)   |\n| Users              | Business analysts, BI tools     | Data scientists, ML engineers       |\n| Use Case           | Reporting, dashboards, BI        | Exploration, ML training, analytics  |\n| Cost               | Higher (optimised storage)      | Lower (object storage like S3)      |\n| Data Quality       | High (curated, cleaned)          | Variable (raw, needs processing)    |\n| Query Performance  | Fast for aggregations            | Slower unless indexed/cached        |\n\nData Warehouse Example:\nA retail company stores 5 years of transactional sales data in a Snowflake data warehouse with pre-defined tables: fact_sales, dim_products, dim_customers. Business analysts run SQL queries to generate quarterly sales reports. Data is loaded via ETL pipeline that validates, deduplicates, and aggregates source data before insertion.\n\nData Lake Example:\nAn autonomous vehicle company stores raw camera images, LiDAR scans, and GPS logs from test drives in an AWS S3 data lake as Parquet and JSON files. Data scientists access the data via Apache Spark to train perception models. Data is stored in original format \u2014 no preprocessing required before ingestion.\n\nWhy Both Matter:\nMost mature ML organisations have both \u2014 a data lake for raw data storage and ML pipelines, and a data warehouse for business intelligence and reporting. Using only a data warehouse for ML wastes storage on unstructured data; using only a data lake makes SQL reporting slow and complex."

        "L1": "You encounter Transactional Processing and ACID in a real project. Here's how to think about it: What is Transactional Processing?",
        "L2": "Transactional processing is a bank teller making one withdrawal at a time \u2014 immediate, consistent, nothing is ever half-updated. ACID is what ensures a $100 withdrawal doesn't result in -$20 or $80 disappearing.",
        "L3": "Atomicity ensures partial transactions don't exist. Consistency ensures the database rules are never violated. Isolation means concurrent transactions don't see each other's intermediate states. Durability means committed transactions survive crashes.",
        "L4": "ACID trades off performance \u2014 full isolation is expensive. Weaker isolation levels (read uncommitted) allow dirty reads but are faster. Not all systems need full ACID \u2014 analytical systems (OLAP) often sacrifice consistency for speed.",
        "L5": "What is transactional processing? Explain the ACID properties and their role in data systems.\n\nTransactional processing refers to a computing paradigm where operations are grouped into logical units called transactions \u2014 sequences of operations that either complete entirely (all operations applied) or not at all (no operations applied). This is the foundation of relational database management systems (RDBMS) and any system requiring data integrity.\n\n**The ACID Properties**\n\nACID is an acronym for Atomicity, Consistency, Isolation, Durability \u2014 the four guarantees that transactions provide:\n\n**Atomicity (All or Nothing)**\nA transaction is atomic: all operations in the transaction succeed, or none do. There is no partial state. If a debit from account A fails mid-transaction, the credit to account B is also rolled back. Implemented via transaction logs and rollback mechanisms.\n\nExample failure without atomicity: Money deducted from account A but not credited to account B \u2014 \u00a3100 vanished from the system.\n\n**Consistency (Validity)**\nA transaction must transform the database from one valid state to another \u2014 never violate integrity constraints. All defined constraints (primary keys, foreign keys, CHECK constraints) must be satisfied after the transaction commits.\n\nExample: A foreign key constraint ensures every order references a valid customer. Consistency violation: an order references a deleted customer \u2014 constraint fails, transaction aborts.\n\n**Isolation (Concurrency Control)**\nConcurrent transactions must not interfere with each other. The result of running transactions concurrently must be the same as running them sequentially (serially). In practice, databases use isolation levels (READ UNCOMMITTED, READ COMMITTED, REPEATABLE READ, SERIALISABLE) that trade off correctness against performance.\n\nExample without isolation: Two concurrent transactions both read account balance \u00a31000, both debit \u00a3500 \u2014 result should be \u00a30 (sequential execution) but concurrent execution might show \u00a3500 (lost update).\n\n**Durability (Persistence)**\nOnce a transaction commits, its effects are permanent \u2014 survive even system crashes. Typically implemented by writing to disk (or replicated storage) before acknowledging commit.\n\nExample: Power failure immediately after COMMIT must not lose the committed transaction's data.\n\n**Transactional Processing vs Analytical Processing**\n\n| Property | OLTP (Transactional) | OLAP (Analytical) |\n|----------|----------------------|-------------------|\n| Workload | Short, simple queries, high volume | Complex, long queries, lower volume |\n| Updates | Continuous, real-time | Batch or periodic loads |\n| Schema | Normalised (3NF) | Denormalised (star/snowflake) |\n| ACID | Required | Relaxed (eventual consistency acceptable) |\n| Examples | Bank transactions, order processing | Data warehouse, BI dashboards |\n\n**Why ACID Matters for ML Systems**\n\nFeature stores and model registries that store training data and model artefacts need ACID guarantees to ensure data consistency. When models are served from a database (Topic 5, Q79 Model-as-a-Service), transactional integrity ensures the model version and its associated metadata remain consistent."

        "L1": "You encounter Analytical Processing in a real project. Here's how to think about it: - Analytical Processing (OLAP): Used to analyze large volumes of historical data for decision-making.",

        "L5": "What is Analytical Processing?\n\nAnalytical Processing (OLAP \u2014 Online Analytical Processing) is used to analyse large volumes of historical data for decision-making. It involves complex queries that aggregate, summarise, and model data across many dimensions to identify trends, patterns, and insights.\n\nCharacteristics of Analytical Processing:\n- Reads large volumes of historical data (often months or years)\n- Complex queries involving aggregations (SUM, AVG, COUNT), groupings, and multi-table joins\n- Primarily read-heavy with occasional bulk loads\n- Optimised for throughput, not transaction rate\n- Queries may take seconds to minutes\n\nExamples of Analytical Processing:\n1. Business Intelligence Reporting\n   - \"What were our quarterly sales by region and product category compared to last year?\"\n   - Uses data warehouse with pre-aggregated data\n\n2. Sales Trend Analysis\n   - Analysing 3 years of daily transaction data to identify seasonal purchasing patterns\n   - Example: Retailer notices 3x spike in umbrellas sales every March in London \u2014 uses for inventory planning\n\n3. ML Feature Computation\n   - Computing aggregate features like \"average customer purchase frequency over 90 days\" from transaction history\n   - Example: A bank computes mean/median/std of transaction amounts per customer for fraud detection model training\n\n4. Ad-hoc Data Exploration\n   - Data scientist running Jupyter notebook to explore customer churn data across 50 dimensions\n\nComparison \u2014 Analytical vs Transactional (OLTP):\n\n| Aspect              | Analytical Processing (OLAP)             | Transactional Processing (OLTP)              |\n|---------------------|------------------------------------------|---------------------------------------------|\n| Purpose             | Analysis, reporting, decision-making      | Day-to-day operations                       |\n| Data Volume         | Millions of rows per query               | Single or few rows per transaction          |\n| Query Type          | Complex, read-only, aggregations         | Simple, read-write, point queries           |\n| Update Frequency     | Periodic batch or streaming               | Continuous, real-time                       |\n| Response Time       | Seconds to minutes acceptable             | Milliseconds required                       |\n| Users               | Data analysts, executives, data scientists | Application users, operators                 |\n| Example Tool        | Snowflake, BigQuery, Redshift            | PostgreSQL, MySQL, MongoDB                  |\n| Design Goal         | Optimise for complex scan + aggregation  | Optimise for high-volume point queries      |\n\nIn ML Systems:\nAnalytical processing is used to generate training features (aggregating user behaviour over time), evaluate model performance across cohorts, and monitor data drift by comparing statistical properties of current vs historical data."

      "module": 4,
      "topic": "Training Validation Testing Datasets",
      "layers": {
        "L1": "You encounter Training Validation Testing Datasets in a real project. Here's how to think about it: What are training, validation and testing data sets?",
        "L2": "Training data is your textbook with practice problems. Validation data is the mid-term exam you use to calibrate your study strategy. Test data is the final exam you haven't seen \u2014 the only honest measure of whether you actually learned.",
        "L3": "Training data fits the model \u2014 optimizes parameters to minimize training loss. Validation data tunes hyperparameters and detects overfitting \u2014 used to select the best model architecture. Test data evaluates generalization \u2014 must remain unseen during all development to be a valid measure.",
        "L4": "If test data leaks into training (data leakage), your 'exam score' is meaningless. Time-based splits where train contains future data give false confidence. Validation data used too many times for hyperparameter tuning causes overfitting to the validation set itself.",
        "L5": "What are training, validation and testing datasets? Explain the purpose of each.\n\nThese three disjoint subsets of data serve distinct roles in building a machine learning system that generalises to unseen real-world data.\n\n**Training Set (typically 60\u201380% of data)**\n\nThe training set is the portion of data used to fit (train) the model parameters. The model learns patterns by minimising a loss function over this data through iterative optimisation (e.g., gradient descent). The training set must be representative of the problem \u2014 if it is biased or non-representative, the model will learn those biases.\n\nKey constraint: The model sees the training data during learning, so it can always be made to fit training data perfectly (especially with highly flexible models). This is why the other splits are needed.\n\n**Validation Set (typically 10\u201320% of data)**\n\nThe validation set (also called the development or dev set) is held out during training and used for two critical purposes:\n1. **Hyperparameter tuning:** Comparing different model architectures, learning rates, regularisation strengths, etc., and selecting the configuration that performs best on the validation set.\n2. **Early stopping / overfitting detection:** Monitoring validation loss during training to detect when the model begins to overfit (validation loss stops decreasing while training loss continues to fall).\n\nImportant: The validation set is used iteratively during development. This means the validation set indirectly influences model selection, which can lead to overfitting to the validation set \u2014 a subtle but real risk known as \"validation set overfitting.\"\n\n**Test Set (typically 10\u201320% of data)**\n\nThe test set is a truly held-out portion of data that is NEVER used during model development or selection. It provides an unbiased estimate of how the model will perform on genuinely unseen data in production. The test set should:\n- Be representative of the real-world distribution the model will encounter\n- Be large enough to give a statistically reliable estimate\n- Be used only ONCE (or very infrequently) to avoid information leakage\n\n**Why Three Splits and Not Two?**\n\nUsing only training and validation (no separate test set) leads to an optimistically biased performance estimate \u2014 since the model and hyperparameters were selected to maximise validation performance, the validation score is not an unbiased estimate of real performance.\n\nUsing only training and test (no validation) means you have no data to tune hyperparameters during development without contaminating your test set.\n\n**Cross-Validation as an Alternative**\n\nWhen data is scarce, k-fold cross-validation provides a more statistically efficient estimate. The data is split into k folds; each fold serves as the validation set once while the remaining k-1 folds train. This gives k independent estimates averaged together. Common choices: k=5 or k=10.\n\n**Key Exam Point:** Be clear about the purpose of each split and why all three are needed. A common exam trap is to describe the validation set as being used only once \u2014 it is used iteratively during development."

      "layers": {
        "L1": "You encounter Two Families of Sampling in a real project. Here's how to think about it: What are the two families of sampling?",
        "L2": "Probability sampling is a lottery where everyone in a hat has a known chance of being picked. Non-probability sampling is a researcher choosing people from the street corner because they're convenient.",
        "L3": "Probability sampling allows statistical inference \u2014 you can calculate confidence intervals and know how representative your sample is. Non-probability sampling is faster and cheaper but introduces selection bias that can't be corrected with statistics alone.",
        "L4": "Non-probability sampling silently introduces bias \u2014 convenience samples over-represent accessible populations. Probability sampling can still fail if the sampling frame (who's in the hat) doesn't match the target population.",
        "L5": "What are the two families of sampling?\n\nProbability Sampling: Every member of the population has a known, non-zero chance of being selected. This allows statistical inference \u2014 you can calculate confidence intervals and estimate how representative your sample is.\n\nNon-Probability Sampling: Members are selected based on non-random criteria. There is no known probability of selection. While faster and cheaper, it introduces selection bias that cannot be corrected with statistics alone.\n\n--- PROBABILITY SAMPLING METHODS ---\n\n1. Simple Random Sampling\n   Every individual has equal chance of selection \u2014 like drawing names from a hat.\n   Example: Randomly select 500 customers from a database of 100,000 using random number generator.\n   Advantage: No bias, easy to analyse statistically.\n   Disadvantage: May miss rare subgroups; requires access to entire population list.\n\n2. Stratified Sampling\n   Population divided into subgroups (strata) by a relevant characteristic, then random sample drawn from each stratum proportionally.\n   Example: In a customer satisfaction survey, stratify by age group (18-25, 26-40, 41-60, 60+) then randomly sample 10% from each age group.\n   Advantage: Ensures rare subgroups are represented; reduces variance in estimates.\n   Disadvantage: Requires knowing the stratification variable upfront.\n\n3. Cluster Sampling\n   Entire clusters (not individuals) are randomly selected, and all members of selected clusters are surveyed.\n   Example: Randomly select 5 schools from a city, then survey ALL students in those 5 schools.\n   Advantage: Cost-effective for geographically spread populations.\n   Disadvantage: High variance if clusters are internally homogeneous.\n\n4. Systematic Sampling\n   Select every k-th individual from a list, where k = population size / sample size.\n   Example: From a production line of 10,000 items, inspect every 20th item (k=20).\n   Advantage: Simple to implement; evenly spread across population.\n   Disadvantage: Silent failure if data has periodic pattern matching k.\n\n--- NON-PROBABILITY SAMPLING METHODS ---\n\n1. Convenience Sampling\n   Select whoever is easiest to reach.\n   Example: Survey customers who visit your website on a particular day.\n   Bias: Over-represents accessible, active users and under-represents disengaged or new users.\n\n2. Judgment (Expert) Sampling\n   Expert selects a \"representative\" sample based on domain knowledge.\n   Example: An ML expert selects 1000 images that \"look representative\" of the dataset for initial model testing.\n   Bias: Expert's intuition may systematically miss underrepresented cases.\n\n3. Snowball Sampling\n   Existing participants recruit future participants from among their acquaintances.\n   Example: Survey hard-to-reach populations like homeless individuals or rare disease patients by starting with a few known cases and expanding through referrals.\n   Bias: Sample becomes a chain of connected individuals \u2014 very unrepresentative of the broader population.\n\n4. Quota Sampling\n   Researcher fills predetermined quotas for specific subgroups (similar to stratified) but selects within quotas non-randomly.\n   Example: Fill quota of 200 men and 200 women aged 25-35 using convenience sampling within each group.\n   Bias: Within-quota selection is non-random; quotas don't guarantee representativeness."

        "L1": "You encounter Data Labelling in a real project. Here's how to think about it: What is Data Labelling and what is the purpose of data labelling?",
        "L2": "Data labeling is like a teacher grading homework \u2014 the marks show the student where they went wrong and what the right answer was.",
        "L3": "Labels provide the supervised signal that lets models learn. Without labels, you're limited to unsupervised methods. Label quality directly determines the upper bound of model performance.",
        "L4": "Label noise (wrong labels) causes models to learn incorrect patterns. Label inconsistency across annotators produces contradictory training signals. Missing labels waste data.",
        "L5": "What is Data Labelling and what is the purpose of data labelling?\n\nData Labelling is the process of annotating raw data with meaningful tags or labels that provide the correct answer for ML training. It transforms raw data (images, text, audio) into labelled examples that supervised ML models learn from.\n\nPurpose of Data Labelling:\n1. Provides Training Signal: Supervised ML requires (input, correct_output) pairs. Labels provide the \"correct output\" that models learn to predict.\n2. Enables Pattern Recognition: Labels teach models what patterns in the input data correspond to what outputs.\n3. Defines Quality Ground Truth: Labels serve as the \"answer key\" for evaluation \u2014 if labels are wrong, model evaluation is meaningless.\n4. Supports Specific Task Learning: Labels define the task (e.g., \"this image contains a pedestrian at coordinates x,y\" vs \"this image is safe to drive through\").\n\nTypes of Labelling Tasks:\n1. Classification (label an entire item)\n   - Image: \"cat\" or \"dog\" or \"neither\"\n   - Text: \"positive\" or \"negative\" sentiment\n   Example: Labelling 50,000 product reviews as positive/negative for sentiment analysis model\n\n2. Detection / Localization (label a region within an item)\n   - Image: Draw bounding boxes around each pedestrian in a driving scene\n   - Text: Identify and label named entities (person, organisation, location) in a news article\n\n3. Sequence Labelling (label each token in a sequence)\n   - Text: Part-of-speech tagging \u2014 label each word as noun/verb/adjective\n   - Audio: Align transcript with speech timestamps\n\n4. Semantic Segmentation (label each pixel)\n   - Image: Label every pixel in a medical scan as \"tumour\" or \"healthy tissue\"\n\nData Labelling is the largest single cost in many supervised ML projects. Label quality directly determines the upper bound of model performance \u2014 a model cannot exceed the quality of its labels."
