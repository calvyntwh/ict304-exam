<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ICT304 Concept Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600&family=Inter:wght@400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <style>
    /* ===== CSS CUSTOM PROPERTIES ===== */
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --primary: #6c8aff;
      --accent: #f5a623;
      --success: #4ade80;
      --danger: #f87171;
      --text: #e8eaf0;
      --text-secondary: #8b8fa8;
      --m1: #ff6b6b;
      --m2: #ffa94d;
      --m3: #ffd43b;
      --m4: #69db7c;
      --m5: #4dabf7;
      --m6: #da77f2;
      --font-heading: 'Crimson Pro', Georgia, serif;
      --font-body: 'Inter', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --radius: 12px;
      --sidebar-width: 220px;
      --header-height: 56px;
    }

    /* ===== BASE RESET + BODY + HTML ===== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 16px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      line-height: 1.7;
      min-height: 100vh;
    }

    /* ===== .app GRID LAYOUT ===== */
    .app {
      display: grid;
      grid-template-columns: var(--sidebar-width) 1fr;
      grid-template-rows: var(--header-height) 1fr;
      height: 100vh;
      overflow: hidden;
    }

    /* ===== .header STYLES ===== */
    .header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      gap: 16px;
      height: var(--header-height);
    }

    .app-title {
      font-family: var(--font-heading);
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ===== .sidebar STYLES ===== */
    .sidebar {
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 16px 0;
      background: var(--surface);
    }

    .sidebar-inner {
      display: flex;
      flex-direction: column;
    }

    .sidebar-divider {
      height: 1px;
      background: var(--border);
      margin: 12px 0;
    }

    /* ===== .main STYLES ===== */
    .main {
      overflow-y: auto;
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #concept-card {
      width: 100%;
      max-width: 720px;
    }

    /* ===== .btn BASE + VARIANTS ===== */
    .btn {
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-family: var(--font-body);
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn:hover {
      opacity: 0.85;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
    }

    .btn-ghost:hover {
      color: var(--text);
    }

    /* ===== .module-btn + .module-dot + .module-count ===== */
    .module-list {
      display: flex;
      flex-direction: column;
    }

    .module-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 16px;
      border: none;
      background: transparent;
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s;
    }

    .module-btn:hover {
      background: var(--bg);
    }

    .module-btn.active {
      background: var(--bg);
      color: var(--primary);
    }

    .module-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .module-count {
      margin-left: auto;
      color: var(--text-secondary);
      font-size: 12px;
    }

    /* ===== .progress-wrap + PROGRESS BAR STYLES ===== */
    .progress-section {
      padding: 12px 16px;
    }

    .progress-wrap {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .progress-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .progress-count {
      font-size: 13px;
      margin-bottom: 4px;
    }

    .progress-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 4px;
    }

    .progress-fill {
      height: 100%;
      background: var(--primary);
      transition: width 0.3s;
    }

    .progress-pct {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 10px;
    }

    .confidence-summary {
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .conf-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      display: inline-block;
    }

    /* ===== .concept-badge + .concept-topic ===== */
    .concept-header {
      margin-bottom: 24px;
    }

    .concept-meta {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .concept-badge {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 100px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }

    .concept-topic {
      font-family: var(--font-heading);
      font-size: 28px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }

    /* ===== .layer + .layer-header + .layer-label + .layer-toggle + .layer-content ===== */
    .layers {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .layer {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .layer:hover {
      border-color: var(--primary);
    }

    .layer.revealed {
      border-color: var(--border);
    }

    .layer.revealed:hover {
      border-color: var(--border);
    }

    .layer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      cursor: pointer;
      user-select: none;
    }

    .layer-header:hover {
      background: rgba(255, 255, 255, 0.02);
    }

    .layer-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--primary);
    }

    .layer-toggle {
      font-size: 12px;
      color: var(--primary);
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 8px;
      border-radius: 4px;
      font-family: var(--font-body);
    }

    .layer-content {
      padding: 0 20px 16px;
      font-size: 16px;
      line-height: 1.8;
      color: var(--text);
      display: none;
    }

    .layer-content.expanded {
      display: block;
    }

    .layer-content code {
      font-family: var(--font-mono);
      font-size: 14px;
      background: var(--bg);
      padding: 1px 6px;
      border-radius: 4px;
    }

    /* ===== .exam-answer-section ===== */
    .exam-answer-section {
      margin-top: 4px;
    }

    .exam-answer-btn {
      display: block;
      width: 100%;
      padding: 12px 20px;
      font-size: 13px;
      font-family: var(--font-body);
      color: var(--accent);
      background: rgba(245, 166, 35, 0.08);
      border: 1px solid rgba(245, 166, 35, 0.3);
      border-radius: var(--radius);
      cursor: pointer;
      text-align: center;
      transition: background 0.2s, border-color 0.2s;
      letter-spacing: 0.02em;
    }

    .exam-answer-btn:hover {
      background: rgba(245, 166, 35, 0.14);
      border-color: var(--accent);
    }

    .exam-answer-content {
      display: none;
      margin-top: 12px;
      padding: 20px;
      background: var(--surface);
      border: 1px solid rgba(245, 166, 35, 0.25);
      border-radius: var(--radius);
      font-size: 15px;
      line-height: 1.8;
      color: var(--text);
    }

    .exam-answer-content.expanded {
      display: block;
    }

    /* ===== .confidence-btn + selected states ===== */
    .confidence-row {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      margin-bottom: 24px;
      align-items: center;
      flex-wrap: wrap;
    }

    .confidence-btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: var(--font-body);
    }

    .confidence-btn:hover {
      border-color: var(--primary);
      color: var(--text);
    }

    .confidence-btn.selected.low {
      background: #7f1d1d;
      border-color: var(--accent);
      color: var(--accent);
    }

    .confidence-btn.selected.med {
      background: #713f12;
      border-color: var(--accent);
      color: var(--accent);
    }

    .confidence-btn.selected.high {
      background: #14532d;
      border-color: var(--success);
      color: var(--success);
    }

    /* ===== .card-nav + .nav-btn ===== */
    .card-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-top: 24px;
    }

    .nav-btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: var(--font-body);
    }

    .nav-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .nav-btn:disabled {
      opacity: 0.3;
      cursor: default;
    }

    /* ===== .quiz-overlay + .quiz-overlay.hidden + .quiz-card + .quiz-header ===== */
    .quiz-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 17, 23, 0.97);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 24px;
      overflow-y: auto;
    }

    .quiz-overlay.hidden {
      display: none;
    }

    .quiz-card {
      width: 100%;
      max-width: 720px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
    }

    .quiz-header {
      width: 100%;
      max-width: 720px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .quiz-progress-label {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .quiz-progress-bar {
      width: 200px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }

    .quiz-progress-fill {
      height: 100%;
      background: var(--primary);
      transition: width 0.3s ease;
      border-radius: 2px;
    }

    /* ===== .quiz-topic + .quiz-meta + .quiz-reveal-area + .quiz-answer + .quiz-complete ===== */
    .quiz-topic {
      font-family: var(--font-heading);
      font-size: 24px;
      color: var(--text);
      margin-bottom: 8px;
    }

    .quiz-meta {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 28px;
    }

    .quiz-reveal-area {
      text-align: center;
      padding: 24px 0;
    }

    .quiz-reveal-btn {
      padding: 14px 28px;
      border-radius: 8px;
      border: none;
      background: var(--primary);
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      font-family: var(--font-body);
      transition: opacity 0.15s;
    }

    .quiz-reveal-btn:hover {
      opacity: 0.85;
    }

    .quiz-answer {
      display: none;
    }

    .quiz-answer.visible {
      display: block;
    }

    .quiz-answer-text {
      font-size: 15px;
      line-height: 1.8;
      color: var(--text);
      margin-bottom: 20px;
    }

    .quiz-answer-text hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 20px 0;
    }

    .quiz-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .quiz-skip-btn {
      padding: 12px 20px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      font-size: 14px;
      cursor: pointer;
      font-family: var(--font-body);
    }

    .quiz-complete {
      text-align: center;
      padding: 48px;
      font-family: var(--font-heading);
    }

    .quiz-complete h2 {
      font-size: 28px;
      margin-bottom: 12px;
    }

    .quiz-complete p {
      color: var(--text-secondary);
      font-size: 16px;
      margin-bottom: 24px;
    }

    /* ===== .stat-* STYLES ===== */
    .stats-body {
      width: 100%;
      max-width: 720px;
    }

    .stat-modal-title {
      font-family: var(--font-heading);
      font-size: 22px;
    }

    .stat-cards {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
    }

    .stat-card-num {
      font-size: 32px;
      font-weight: 600;
    }

    .stat-card-label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .stat-modules {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
    }

    .stat-section-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    .stat-module-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      font-size: 13px;
    }

    .stat-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .stat-module-name {
      flex: 1;
    }

    .stat-count {
      color: var(--text-secondary);
    }

    .stat-low {
      color: var(--accent);
      font-size: 12px;
    }

    .stat-weak-spots {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }

    .stat-weak-item {
      display: flex;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      cursor: pointer;
      color: var(--primary);
    }

    .stat-weak-item:last-child {
      border-bottom: none;
    }

    .stat-weak-id {
      color: var(--text-secondary);
      flex-shrink: 0;
      min-width: 32px;
    }

    /* ===== .search-wrap + .search-input + .search-results ===== */
    .search-wrap {
      position: relative;
      flex: 1;
      max-width: 300px;
    }

    .search-input {
      width: 100%;
      padding: 8px 12px 8px 36px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      outline: none;
    }

    .search-input:focus {
      border-color: var(--primary);
    }

    .search-input::placeholder {
      color: var(--text-secondary);
    }

    .search-results {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      max-height: 320px;
      overflow-y: auto;
      z-index: 200;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }

    .search-results.hidden {
      display: none;
    }

    .search-result-item {
      padding: 10px 14px;
      font-size: 13px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }

    .search-result-item:last-child {
      border-bottom: none;
    }

    .search-result-item:hover,
    .search-result-item.focused {
      background: var(--bg);
    }

    .search-result-topic {
      color: var(--text);
      font-weight: 500;
      margin-bottom: 2px;
    }

    .search-result-meta {
      font-size: 11px;
      color: var(--text-secondary);
    }

    .search-no-results {
      padding: 12px 14px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    /* ===== .shortcuts-grid + .shortcut-row + .shortcut-key + .layer-guide ===== */
    .shortcuts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 20px;
    }

    .shortcut-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .shortcut-key {
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 3px 10px;
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 13px;
      min-width: 44px;
      text-align: center;
      color: var(--text);
    }

    .shortcut-desc {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .layer-guide {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }

    .layer-guide-row {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .layer-guide-row:last-child {
      margin-bottom: 0;
    }

    .layer-guide-num {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ===== @media (max-width: 768px) RESPONSIVE STYLES ===== */
    @media (max-width: 768px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: var(--header-height) auto 1fr;
      }

      .sidebar {
        border-right: none;
        border-bottom: 1px solid var(--border);
        overflow-x: auto;
        padding: 8px 16px;
      }

      .sidebar-inner {
        display: flex;
        gap: 8px;
        overflow-x: auto;
      }

      .sidebar-divider {
        width: 1px;
        height: auto;
        margin: 0 12px;
      }

      .progress-section {
        padding: 0;
      }

      .main {
        padding: 20px 16px;
      }

      .header {
        flex-wrap: wrap;
      }

      .app-title {
        font-size: 16px;
      }

      .header-actions {
        gap: 4px;
      }

      .btn {
        padding: 6px 12px;
        font-size: 13px;
      }

      .stat-cards {
        grid-template-columns: 1fr 1fr;
      }

      .shortcuts-grid {
        grid-template-columns: 1fr;
      }

      .concept-topic {
        font-size: 22px;
      }
    }

    /* ===== kbd STYLES ===== */
    kbd {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 6px;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="app-title">ICT304 Concept Explorer</h1>
      <div class="search-wrap">
        <input type="text" id="search-input" class="search-input"
          placeholder="Search... (/)" autocomplete="off" spellcheck="false">
        <div class="search-results hidden" id="search-results"></div>
      </div>
      <div class="header-actions">
        <button id="btn-quiz" class="btn btn-primary">Quiz Mode</button>
        <button id="btn-stats" class="btn btn-ghost">Stats</button>
        <button id="btn-help" class="btn btn-ghost" title="Keyboard shortcuts">?</button>
      </div>
    </header>
    <aside class="sidebar">
      <div class="sidebar-inner">
        <nav class="module-list" id="module-list"></nav>
        <div class="sidebar-divider"></div>
        <div class="progress-section" id="progress-section"></div>
      </div>
    </aside>
    <main class="main" id="main">
      <div id="concept-card"></div>
    </main>
  </div>
  <div class="quiz-overlay hidden" id="quiz-overlay"></div>

  <script type="application/json" id="kb">
{"concepts": [{"id": "Q1", "module": 1, "topic": "Intelligent Systems Characteristics", "layers": {"L1": "You encounter Intelligent Systems Characteristics in a real project. Here's how to think about it: What are the characteristics of Intelligent Systems?", "L2": "An Intelligent System is like a human worker: it senses the environment (perception), learns from mistakes (learning), plans next steps (reasoning), works without constant supervision (autonomy), and adjusts when things change (adaptability).", "L3": "Intelligence emerges from combining five capabilities: perception (data), learning (improvement), reasoning (logic), autonomy (independence), and adaptability (flexibility). Lose any one and you get a brittle or limited system.", "L4": "A system becomes brittle when it over-optimizes for one capability at the expense of others. A robot that learns but can't perceive obstacles will fail catastrophically in new environments.", "L5": "What are the characteristics of Intelligent Systems? Use examples to illustrate them, and link them to the AI techniques you have learned. Characteristics: - Perception \u2013 Ability to sense the environment. - Example: Self-driving cars detect road signs. - AI Technique: Computer Vision, Sensors. - Learning \u2013 Improve with experience or data. - Example: Spotify recommends songs based on listening history. - AI Technique: Machine Learning. - Reasoning \u2013 Makes logical decisions or plans. - Example: AI playing chess plans next moves. - AI Technique: Search Algorithms, Rule-based Systems. - Autonomy \u2013 Operate without human input. - Example: Robot vacuum cleans patterns on guidance. - AI Technique: Robotics, Reinforcement Learning. - Adaptability \u2013 Adjust to new conditions. - Example: Fraud detecti"}}, {"id": "Q2", "module": 1, "topic": "AI vs ML vs DL Hierarchy", "layers": {"L1": "You encounter AI vs ML vs DL Hierarchy in a real project. Here's how to think about it: What are the differences between AI, Machine Learning, and Deep Learning?", "L2": "AI is the entire concept of making machines smart. ML is a subset where machines learn from examples. DL is a subset of ML using deep neural networks \u2014 like how mammals are animals, primates are a subset of mammals, and humans are a specific type of primate.", "L3": "AI includes everything from rule-based chatbots to ML. ML includes everything from linear regression to deep learning. DL uses many layers of neural networks to learn hierarchical representations \u2014 each layer learns progressively more abstract features.", "L4": "Confusing the hierarchy leads to using the wrong technology for a problem. Not every AI problem needs DL \u2014 simple ML often works better on small datasets. DL needs massive data and compute that most organizations can't afford.", "L5": "What are the differences between AI, Machine Learning, and Deep Learning? Name | Description | Example AI | Makes machines act smart like humans. | Chatbots, voice assistants Machine Learning (ML) | Subset of AI where machines learn from data. | Email spam filters, recommendations Deep Learning (DL) | Subset of ML using deep neural networks for complex tasks. | Image recognition, self-driving cars"}}, {"id": "Q3", "module": 1, "topic": "Turing Test", "layers": {"L1": "You encounter Turing Test in a real project. Here's how to think about it: The Turing Test checks if a machine can act like a human in conversation.", "L2": "Like a text-based game of peek-a-boo \u2014 if a person can't tell they're talking to a machine after 5 minutes, the machine passes.", "L3": "The test works because it operationalizes intelligence as behavioral equivalence \u2014 if you can't tell the difference conversationally, the machine is functionally intelligent on that dimension.", "L4": "Machines can pass the Turing Test by using vague language, manipulation, or following scripts rather than genuinely understanding \u2014 passing the test doesn't prove real intelligence.", "L5": "What is the Turing Test? The Turing Test checks if a machine can act like a human in conversation. If a person cannot tell if they are talking to a machine or a human, the machine passes the test."}}, {"id": "Q4", "module": 1, "topic": "Computational Intelligence vs ML", "layers": {"L1": "You encounter Computational Intelligence vs ML in a real project. Here's how to think about it: What are the differences between Computational Intelligence and Machine Learning?", "L2": "CI is like a master craftsman using intuition and hand tools \u2014 learned through experience, works well with incomplete information. ML is like a chef following a recipe calibrated from thousands of past dishes \u2014 needs lots of data but finds patterns humans wouldn't think to look for.", "L3": "CI uses nature-inspired techniques (evolution, neural networks, fuzzy logic) that don't require gradient information. ML uses statistical learning that requires large labeled datasets. CI can handle problems where you can't compute gradients; ML excels when you have abundant data.", "L4": "CI needs expert problem framing \u2014 it can't discover what problem to solve. ML needs large labeled datasets that may not exist. Both can fail when the problem assumptions don't hold.", "L5": "What are the differences between Computational Intelligence and Machine Learning? Feature | Computational Intelligence (CI) | Machine Learning (ML) Basis | Nature-inspired techniques | Statistical learning from data Techniques | Neural networks, fuzzy logic, evolutionary algorithms | Supervised, unsupervised and reinforcement learning Data dependency | Less dependent on large datasets | Highly dependent on large datasets Example | Rules using fuzzy logic to model schedules | Predicting house prices using past data"}}, {"id": "Q5", "module": 1, "topic": "Rationality Concepts", "layers": {"L1": "You encounter Rationality Concepts in a real project. Here's how to think about it: - Rationality: Making the best decision based on available knowledge and goals.", "L2": "Thinking rationally is solving a puzzle with formal logic. Acting rationally is choosing the fastest route home using everything you know right now.", "L3": "Rationality requires both the knowledge base AND a decision mechanism. Think rationally uses logic on known facts; act rationally uses logic plus real-time sensing to choose the best action.", "L4": "Rationality assumes the world behaves consistently \u2014 if the knowledge base encodes wrong rules, acting rationally produces consistently wrong decisions. Think rationally needs complete knowledge; act rationally needs accurate sensing of a changing world.", "L5": "What is rationality? What is think rationally? What is act rationally? - Rationality: Making the best decision based on available knowledge and goals. - Thinking Rationally: Using logic and reasoning to make decisions. Example: Solving a math problem step by step. - Acting Rationally: Choosing the best action to achieve goals in a given situation. Example: A delivery drone choosing the shortest and safest route."}}, {"id": "Q6", "module": 1, "topic": "DIKI Pyramid", "layers": {"L1": "You encounter DIKI Pyramid in a real project. Here's how to think about it: Describe the steps/stages of going from Data, Information, Knowledge, Intelligence.", "L2": "Data is scattered letters; information is those letters forming readable words; knowledge is understanding what those words mean in context; intelligence is using that understanding to make good decisions.", "L3": "Each level adds interpretation: data is meaningless numbers, information connects numbers to meaning, knowledge recognizes patterns in that meaning, intelligence acts on those patterns to achieve goals.", "L4": "The DIKI pyramid can mislead if applied mechanically \u2014 more data doesn't automatically lead to more knowledge if the connections are wrong. Intelligence without adaptability (AI) produces brittle systems that fail on novel inputs.", "L5": "Describe the steps/stages of going from Data, Information, Knowledge, Intelligence. 1. Data \u2013 Raw facts (e.g., \"30\u00b0C\") 2. Information \u2013 Data with meaning (e.g., \"Room temperature is 30\u00b0C\") 3. Knowledge \u2013 Understanding patterns (e.g., \"30\u00b0C is warm for an office\") 4. Intelligence \u2013 Using knowledge to make decisions (e.g., \"Turn on AC if > 28\u00b0C\")"}}, {"id": "Q7", "module": 1, "topic": "Case-based Reasoning", "layers": {"L1": "You encounter Case-based Reasoning in a real project. Here's how to think about it: - Case-Based Reasoning (CBR): Solving new problems by finding solutions from similar past cases.", "L2": "Like a doctor who recalls a similar past patient's case to diagnose a new patient, adapting the old treatment as needed.", "L3": "CBR works because the world is full of similar situations. Instead of deriving a solution from first principles every time, you retrieve a past case and adapt it \u2014 faster and leverages hard-won experience.", "L4": "CBR fails when no past case is similar enough \u2014 the retrieval step is critical. If the case base is small or poorly indexed, revision dominates and accuracy suffers.", "L5": "What is Case-based Reasoning? How can we use it? - Case-Based Reasoning (CBR): Solving new problems by finding solutions from similar past cases. How we use it: - Retrieve past similar examples / solutions. - Match current problem with similar case. - Adapt the solution for the new problem. Example: In medical diagnosis, a system compares a new patient's symptoms to past cases to suggest treatments."}}, {"id": "Q8", "module": 1, "topic": "LLM and Generative AI", "layers": {"L1": "You encounter LLM and Generative AI in a real project. Here's how to think about it: What is a Large Language Model (LLM)?", "L2": "An LLM is a librarian who has read millions of books and can discuss any topic fluently. Generative AI is that librarian plus the ability to write new books in the styles they've read. LLMs are specifically text-based generative AI.", "L3": "LLMs are trained on vast text corpora to predict the next word \u2014 this enables fluent text generation. Generative AI includes image synthesis (DALL-E, Stable Diffusion), code generation (CoPilot), and multimodal models. LLMs enabled by transformer architecture that handles long-range context dependencies.", "L4": "LLMs hallucinate \u2014 they generate fluent confident text that sounds right but is factually wrong. They absorb biases from training data. LLMs can't reliably do multi-step reasoning without chain-of-thought prompting.", "L5": "What is a Large Language Model (LLM)? How is that related to Generative AI? - LLM: A type of AI trained on large amounts of text to understand and generate natural language. Examples: ChatGPT, Google Gemini. - Relation to Generative AI: LLMs are a part of Generative AI, which creates new content like text, images, code. LLMs specifically generate text-based content."}}, {"id": "Q9", "module": 1, "topic": "AI Fields Overview", "layers": {"L1": "You encounter AI Fields Overview in a real project. Here's how to think about it: Provide an overview of the field of AI and how each area is different from others.", "L2": "AI fields are like departments in a hospital \u2014 Radiology reads images, Surgery operates, GPs diagnose. Each does something specific, and the whole hospital is stronger together.", "L3": "Different AI areas solve fundamentally different problems: ML learns from data, CV reads images/video, NLP understands text, Robotics moves in physical space. The underlying math and algorithms differ \u2014 mixing them up wastes effort.", "L4": "Treating all AI as interchangeable leads to using the wrong technique for the problem. Deep Learning doesn't fix every problem \u2014 small datasets need simpler models. Knowing which field applies saves months of wasted effort.", "L5": "Provide an overview of the field of AI and how each area is different from others. AI (Artificial Intelligence) is a broad field aiming to create machines smart. Key areas include: Area | Description | Example Machine Learning | Machines learn from data to make predictions | Spam detection Deep Learning | Neural networks that handle complex data like images | Face recognition Computer Vision | Understanding images and videos | Self-driving car detecting lanes Natural Language Processing (NLP) | Understanding and generating human language | Chatbots, Google Translate Robotics | Intelligent systems that interact physically with the world | Warehouse robots Expert Systems | Rule-based systems that mimic expert decision-making | Medical diagnosis systems"}}, {"id": "Q10", "module": 1, "topic": "Data Mining vs Knowledge Engineering", "layers": {"L1": "You encounter Data Mining vs Knowledge Engineering in a real project. Here's how to think about it: What are the differences between them?", "L2": "Data Mining is a prospector panning for gold in a river of data. Knowledge Engineering is a librarian organizing books using a taxonomy they designed from expertise.", "L3": "Data Mining discovers patterns you didn't know existed \u2014 the data reveals its own structure. Knowledge Engineering encodes patterns that experts already know \u2014 it formalizes existing understanding. DM needs large datasets; KE needs domain experts.", "L4": "Data Mining finds patterns that may be spurious or unactionable. Knowledge Engineering can miss patterns that humans wouldn't think to encode as rules. Both fail when the problem assumptions don't match reality.", "L5": "What is Data Mining? What is Knowledge Engineering? What are the differences between them? - Data Mining: Process of discovering patterns or useful information from large data sets. Example: Finding customer buying patterns from sales data. - Knowledge Engineering: Creating systems that mimic expert reasoning by capturing expert knowledge (rules, facts). Example: Building a medical diagnosis system with expert rules. Aspect | Data Mining | Knowledge Engineering Source | Data-driven | Expert-driven Goal | Discover patterns automatically | Models human expertise into rules Output | Models or patterns | Knowledge base and inference rules"}}, {"id": "Q11", "module": 1, "topic": "Data Mining Process Steps", "layers": {"L1": "You encounter Data Mining Process Steps in a real project. Here's how to think about it: List and explain the Data Mining Process.", "L2": "Data mining is like a chef cooking: first pick your ingredients, clean them, chop them, cook them, taste as you go, and finally decide if the dish is worth serving.", "L3": "Selection prevents garbage-in-garbage-out. Preprocessing handles missing values and noise. Transformation makes data compatible with mining algorithms. Interpretation makes patterns actionable.", "L4": "Skipping preprocessing produces misleading patterns. Skipping interpretation means finding patterns you can't act on. Evaluation without ground truth is impossible for unsupervised mining.", "L5": "List and explain the Data Mining Process. 1. Data Collection \u2013 Gather raw data from sources. 2. Data Cleaning \u2013 Remove errors and missing values. 3. Data Integration \u2013 Combine data from different sources. 4. Data Selection \u2013 Choose relevant data for analysis. 5. Data Transformation \u2013 Convert data into suitable format. 6. Data Mining \u2013 Apply algorithms to find patterns. 7. Evaluation \u2013 Interpret the results. 8. Deployment \u2013 Use the results in real applications."}}, {"id": "Q12", "module": 1, "topic": "AI Technique Categories", "layers": {"L1": "You encounter AI Technique Categories in a real project. Here's how to think about it: What is the difference between Data-Driven, Model-Driven, and Knowledge-Driven AI techniques?", "L2": "AI techniques are different problem-solving styles \u2014 symbolic is a grandmaster using rules, connectionist is a student learning from examples, evolutionary is trial-and-error keeping what works best.", "L3": "Symbolic methods need expert-encoded rules \u2014 good for well-defined domains but can't learn from data. Connectionist learns from data \u2014 good for perception tasks but is a black box. Evolutionary searches without gradients \u2014 slow but globally optimal.", "L4": "Symbolic systems can't learn from data. Connectionist systems are black boxes \u2014 you can't explain decisions. Evolutionary is computationally expensive. Statistical methods need large datasets.", "L5": "What is the difference between Data-Driven, Model-Driven, and Knowledge-Driven AI techniques? Technique | Description | Example Data-Driven | Learns from data using patterns/statistics | Machine learning (e.g., spam filter) Model-Driven | Uses mathematical/physics models | Simulation, weather forecast Knowledge-Driven | Uses expert rules and logic | Expert systems (e.g., rule-based diagnosis)"}}, {"id": "Q13", "module": 1, "topic": "Directed vs Undirected Data Mining", "layers": {"L1": "You encounter Directed vs Undirected Data Mining in a real project. Here's how to think about it: What are Directed and Undirected Data Mining?", "L2": "Directed mining is a teacher grading with an answer key. Undirected mining is a librarian organizing books into natural groups without knowing the categories ahead of time.", "L3": "Directed mining predicts a known target \u2014 you know what you're looking for. Undirected discovers structure \u2014 you let the data reveal its own organization. Both are needed in practice.", "L4": "Directed mining overfits if features leak information. Undirected produces clusters that may not be actionable \u2014 discovering 47 customer segments is useless if you can't serve each differently.", "L5": "What are Directed and Undirected Data Mining? Give an example for each. - Directed Data Mining (Supervised): Has a specific goal or target (e.g., prediction). Example: Predicting loan default using past data. - Undirected Data Mining (Unsupervised): No specific target, used to explore data. Example: Finding customer segments using clustering."}}, {"id": "Q14", "module": 1, "topic": "Computational Intelligence Characteristics", "layers": {"L1": "You encounter Computational Intelligence Characteristics in a real project. Here's how to think about it: What is Computational Intelligence?", "L2": "CI is like a survivalist \u2014 adapts without reprogramming, handles missing information gracefully, uses rules of thumb, and copies strategies that work in nature.", "L3": "Adaptivity lets CI systems learn and adjust without explicit reprogramming. Robustness means they work even when inputs are noisy or incomplete. Heuristics trade optimality for speed and feasibility.", "L4": "CI needs good problem framing by a human expert. Heuristics can get stuck in local optima. Bio-inspired doesn't always transfer from nature to digital implementation.", "L5": "What is Computational Intelligence? What are the characteristics of Computational Intelligence? - Computational Intelligence (CI): A set of AI methods inspired by nature to solve complex problems without using exact models. Characteristics: 1. Adaptivity \u2013 Learns and adjusts to changing environments. 2. Robustness \u2013 Handles noisy or incomplete data. 3. Heuristic-based \u2013 Uses trial and error to approximate. 4. Bio-inspired \u2013 Based on natural systems (e.g., evolution, brains). Techniques include: - Neural Networks - Fuzzy Logic - Evolutionary Algorithms"}}, {"id": "Q15", "module": 2, "topic": "Types of Machine Learning", "layers": {"L1": "You encounter Types of Machine Learning in a real project. Here's how to think about it: In Machine Learning, what are the different types of learning?", "L2": "Supervised learning is a student with a textbook and answer key. Unsupervised learning is a toddler categorizing toys by type without being told the names. Reinforcement learning is learning chess by playing and remembering what led to winning.", "L3": "Supervised learning needs labeled data \u2014 the answer key restricts what patterns can be learned. Unsupervised discovers structure without labels \u2014 but you don't know if the clusters are meaningful. Reinforcement learns from experience through rewards and penalties.", "L4": "Supervised models fail when labels are noisy. Unsupervised finds clusters that may not correspond to real categories. Reinforcement requires careful reward design \u2014 misspecified rewards create agents that game the system.", "L5": "In Machine Learning, what are the different types of learning? Provide examples of AI techniques for each learning type. 1. Supervised Learning \u2013 Learns from labeled data. Example: Email spam detection. Technique: Decision Trees, SVM, Neural Networks. 2. Unsupervised Learning \u2013 Finds patterns in unlabeled data. Example: Customer segmentation. Technique: Clustering (K-Means), PCA. 3. Reinforcement Learning \u2013 Learns by trial and error through rewards. Example: Game playing AI like AlphaGo. Technique: Q-Learning, Deep Q-Networks. 4. Semi-Supervised Learning \u2013 Uses a small amount of labeled and large amount of unlabeled data. Example: Text/image with partial labels; techniques like Co-training, Self-training. 5. Self-Supervised Learning \u2013 Generates its own labels from raw data. Example: Langua"}}, {"id": "Q16", "module": 2, "topic": "ML Research vs Production", "layers": {"L1": "You encounter ML Research vs Production in a real project. Here's how to think about it: What are the differences between Machine Learning in Production and Research?", "L2": "Research ML is a chef experimenting in a test kitchen \u2014 creativity, new recipes, doesn't matter if it takes all day. Production ML is a restaurant kitchen \u2014 consistent quality, fast service, every dish identical.", "L3": "Research optimizes for model accuracy. Production optimizes for reliability, latency, and cost simultaneously. These goals conflict \u2014 a model that's 1% more accurate but 10x slower is useless in production. Research underestimates real-world data messiness.", "L4": "A model that works in research fails in production when it encounters data distributions it wasn't trained on. Research ignores inference cost. Models that were state-of-the-art 3 years ago may be deployed with outdated library dependencies.", "L5": "What are the differences between Machine Learning in Production and Research? Aspect | Research | Production Goal | Explore new ideas, improve accuracy | Deliver stable, usable products Data | Clean, curated datasets | Messy, real-world data Speed | Slow/iterative | Fast, reliable, low latency Concerns | Novelty and scientific rigor, accuracy | Speed, scalability, reliability Updates | Frequent model changes | Stable, secure controlled models"}}, {"id": "Q17", "module": 2, "topic": "AI Production Stakeholders", "layers": {"L1": "You encounter AI Production Stakeholders in a real project. Here's how to think about it: Identify the different stakeholders involved in bringing an AI system to production.", "L2": "AI production is like staging a theatre production \u2014 the director (PM) shapes the vision, actors (DS) perform, stage crew (MLE) handles lighting and sets, audience analysts (BA) study reactions.", "L3": "Each stakeholder has different success criteria: DS wants accuracy, MLE wants uptime, PM wants user engagement, BA wants business metrics. These can conflict \u2014 a highly accurate model that no one uses has zero business value.", "L4": "Without alignment, teams optimize for different goals and produce inconsistent systems. BA requirements may conflict with fairness constraints. MLE may reject models that are statistically sound but operationally complex.", "L5": "Identify the different stakeholders involved in bringing an AI system to production. Provide example of objectives of each stakeholder. Stakeholder | Objective Data Scientist | Build accurate, well-tested models ML Engineer | Deploy and maintain models in production Software Developer | Integrate AI into user-facing apps Product Manager | Ensure AI solves real business needs Business Analyst | Align AI outputs with business goals End Users | Use the system for better decision-making or usability"}}, {"id": "Q18", "module": 2, "topic": "Research vs Production Computational Priority", "layers": {"L1": "You encounter Research vs Production Computational Priority in a real project. Here's how to think about it: In Computational Priority, what are the main differences between Research and Production stage?", "L2": "Research compute is a scientist's desktop \u2014 powerful for one person, slow iteration, experiments run overnight. Production compute is a factory floor \u2014 optimized assembly line, fast throughput, every unit identical.", "L3": "Research uses compute for experimentation and exploration \u2014 GPU clusters, jupyter notebooks, many iterations. Production uses compute for inference at scale \u2014 optimized serving, batch prediction, cost per query matters. Research wastes resources; production is resource-constrained.", "L4": "Training a model in research and deploying it in production requires re-engineering the entire compute path. Research models assume unlimited compute; production models must fit latency budgets. Hardware differences (GPU vs CPU) cause silent accuracy drops.", "L5": "In Computational Priority, what are the main differences between Research and Production stage? Aspect | Research Stage | Production Stage Goal | Accuracy, exploring, testing new models | Efficiency, speed, and reliability Resource Used | More compute for experimentation | Optimized compute for cost and speed Scalability | Not a priority | Must scale to handle real users Model Updates | Frequent | Controlled and tested before release"}}, {"id": "Q19", "module": 2, "topic": "Research vs Production Data", "layers": {"L1": "You encounter Research vs Production Data in a real project. Here's how to think about it: What are the main differences between the Data used in Research and Production?", "L2": "Research data is a library with perfectly organized, labeled books. Production data is the real world \u2014 library books with torn pages, coffee stains, missing chapters, and someone using the books as doorstops.", "L3": "Research uses curated historical data. Production uses live real-time streams that arrive at unpredictable rates, with noise, missing values, and adversarial inputs. Research data is static; production data evolves as the world changes.", "L4": "Training on clean research data and deploying on messy production data causes distribution shift failures. Data pipelines that worked in research break in production under load. Label quality that was acceptable in research becomes a fairness liability in production.", "L5": "What are the main differences between the Data used in Research and Production? Aspect | Research Data | Production Data Source | Historical or sample datasets | Live, real-time data Cleanliness | Often cleaned and preprocessed | Can be messy or inconsistent Volume | Smaller manageable sets | Large-scale and continuous Labeling | Labeled and curated | May be unlabeled or noisy Purpose | For training and testing | For real-time predictions or decision-making"}}, {"id": "Q20", "module": 2, "topic": "7 Main AI Problem Types", "layers": {"L1": "You encounter 7 Main AI Problem Types in a real project. Here's how to think about it: What are 7 main typical problems that can be addressed by AI systems?", "L2": "Classification is sorting mail into categories. Regression is predicting tomorrow's temperature. Clustering is grouping customers by buying behavior. Association is finding that people who buy diapers also buy beer.", "L3": "Classification and regression are supervised \u2014 you have labeled examples. Clustering and association are unsupervised \u2014 patterns emerge from data. Sequence analysis handles time-ordered data. Optimization finds the best solution from a space of possibilities.", "L4": "Wrong problem type means the model is solving the wrong task. Classification treated as regression produces meaningless continuous outputs. Recommendation without exploration leads to filter bubbles.", "L5": "What are 7 main typical problems that can be addressed by AI systems? Provide examples and also an AI technique used to solve such problems. AI Problem Type | Example | AI Technique 1. Classification | Email spam detection | Decision Trees, CNN, Neural Networks 2. Regression | Predicting house prices | Linear Regression, Random Forest 3. Clustering | Customer segmentation | K-Means, DBSCAN 4. Recommendation | Movie suggestions on Netflix | Collaborative Filtering, Deep Learning 5. Natural Language Processing (NLP) | Chatbots, translation | Transformers, RNN 6. Computer Vision | Face recognition | CNN (Convolutional Neural Networks) 7. Anomaly Detection | Fraud detection | Autoencoders, Isolation Forest"}}, {"id": "Q21", "module": 3, "topic": "AI Project Considerations", "layers": {"L1": "You encounter AI Project Considerations in a real project. Here's how to think about it: When developing an AI system, the following are some project consideration factors: 1.", "L2": "Framing is choosing which puzzle to solve. Objectives define what winning looks like. Constraints are knowing your time and budget. Phases are chapters in a project story.", "L3": "Framing the problem wrong means solving the wrong thing efficiently. Undefined objectives can't be measured. Unstated constraints surprise you mid-project. Phases that skip steps create compounding errors expensive to fix later.", "L4": "Poor framing locks you into solving the wrong problem efficiently. Unmeasurable objectives create arguments at project end. Hidden constraints cause crises mid-project. Skipped phases make everything cost more to fix later.", "L5": "When developing an AI system, the following are some project consideration factors: 1. Framing; 2. Objectives; 3. Constraints; 4. Phases. Provide discussions for each of them. Discuss the phases in detail. Framing Defining the problem clearly \u2013 What are we solving? Example: Are we predicting sales or classifying products? Objectives What is the goal of the system? Example: Increase customer retention by 10%, or reduce fraud rates. Constraints Limitations like time, budget, data availability, and ethics. Example: Limited labeled data, or real-time processing requirement. Phases (Discussed in Detail) Phase | Description a. Problem Understanding | Define the business problem, success criteria. b. Data Collection | Gather and assess data from various sources. c. Data Preparation | Clean, trans"}}, {"id": "Q22", "module": 3, "topic": "Systems Elements Results", "layers": {"L1": "You encounter Systems Elements Results in a real project. Here's how to think about it: What are systems, elements, and results?", "L2": "A football team is the system, individual players are elements, wins and losses are results \u2014 each level only makes sense in context of the others.", "L3": "Elements are only meaningful in context of the system they serve \u2014 a star quarterback means nothing in a chess team. Results measure whether the system achieves its goal, not whether individual parts are optimal.", "L4": "Optimizing an element without understanding its role in the system can harm overall performance \u2014 a star player can disrupt team coordination.", "L5": "What are systems, elements, and results? - System: A group of interacting parts working together to achieve a goal. Example: A car is a system. - Elements: The individual parts that make up a system. Example: Engine, wheels, brakes of a car. - Results: The output or outcome the system produces. Example: Transportation from one place to another."}}, {"id": "Q23", "module": 3, "topic": "System Hierarchy Terms", "layers": {"L1": "You encounter System Hierarchy Terms in a real project. Here's how to think about it: What are systems, elements, sub-systems, components, parts?", "L2": "Like a university: the whole university is the system, a faculty is a sub-system, a course is a component, a lecture is a part.", "L3": "Parts make up components, components make up sub-systems, sub-systems make up the system. Each level inherits properties from above while adding its own structure.", "L4": "Confusion between hierarchy levels causes communication failures. Saying 'fix the component' is meaningless without specifying which level you're referring to.", "L5": "What are systems, elements, sub-systems, components, parts? - System: Complete functioning unit with a goal. Example: Computer system. - Sub-System: A smaller system within a system. Example: CPU is a sub-system of a computer. - Components: Functional parts of sub-systems. Example: ALU in a CPU. - Parts: Physical or logical units of components. Example: Transistors on a chip. - Elements: General term for any part of a system."}}, {"id": "Q24", "module": 3, "topic": "Engineering Design Process Stages", "layers": {"L1": "You encounter Engineering Design Process Stages in a real project. Here's how to think about it: What are the stages in EDP (Engineering Design Process)?", "L2": "EDP is like writing an essay: understand the question, outline your argument, write drafts, edit sections together, check it answers the prompt, then submit.", "L3": "EDP is iterative \u2014 you cycle back through stages as you learn. Skipping stages compounds errors: wrong problem definition makes everything downstream futile. The spiral model allows revisiting earlier phases as understanding deepens.", "L4": "Scope creep happens when deployment expectations aren't managed. Integration reveals gaps that requirements didn't catch. EDP is iterative \u2014 expect to revisit earlier stages as you learn.", "L5": "What are the stages in EDP (Engineering Design Process)? The Engineering Design Process (EDP) includes the following stages: 1. Project Definition - Meet with stakeholders. - Define the initial objectives and understand the problem. 2. Requirements Definition and Engineering Specifications - Develop clear and detailed requirements. - Document and get stakeholder approval before proceeding. 3. Conceptual Design - Brainstorm and generate multiple ideas. - Use trade studies, models, or prototypes to compare. - Select the best concept to move forward. 4. Product Design, Fabrication, and Test - Complete detailed design and testing. - Test performance; if requirements are met, move to manufacturing."}}, {"id": "Q25", "module": 3, "topic": "Three Main System Engineering Processes", "layers": {"L1": "You encounter Three Main System Engineering Processes in a real project. Here's how to think about it: What are three main processes in system engineering?", "L2": "System design is an architect's blueprint. Product realization is the construction crew building. Product life cycle is managing the entire building lifespan from planning to demolition.", "L3": "Top-down design ensures all parts fit before building starts. Bottom-up realization enables parallel work and independent testing. Life cycle management prevents shipping before understanding support costs.", "L4": "Top-down without bottom-up expertise creates unrealistic designs. Bottom-up without top-down coordination leads to incompatible components. Life cycle ignored means expensive late-stage changes.", "L5": "What are three main processes in system engineering? Use examples to explain them. The three main processes in system engineering are: System Design Processes - Collect stakeholder expectations and convert them into technical requirements. - Decompose requirements into smaller, well-defined entities. - Applies top-down from system level to sub-systems and components. Example: For a self-driving car system design: define high-level needs (e.g., obstacle detection) and breaks them down into sub-systems like sensors, AI vision models, and control systems. Product Realization Processes - Build or acquire components (buy, code, reuse). - Unit test, and validate each product. - Allows bottom-up by integrating components into higher-level systems. Example: Assembling and testing the AI module and"}}, {"id": "Q26", "module": 3, "topic": "Four System Design Processes", "layers": {"L1": "You encounter Four System Design Processes in a real project. Here's how to think about it: What are the four system design processes?", "L2": "Like planning a wedding: agree with families on expectations first, translate to budget and guest list, plan the day timeline, then choose venue and caterer.", "L3": "Without stakeholder alignment upfront, requirements constantly change. Without translating to technical specs, designers can't verify they've met expectations. Without logical models, components won't interface correctly.", "L4": "Skipping stakeholder alignment means building the wrong thing. Weak technical requirements let defects through. Poor logical models cause integration failures. Architectural changes late in development are the most expensive kind.", "L5": "What are the four system design processes? Use examples to explain them. The four system design processes are: Define and Baseline Stakeholder Expectations - Understand what stakeholders need and expect from the system. - Document their expectations and get approval. Example: An autonomous drone stakeholders may require it to fly 20 minutes and avoid obstacles. Generate and Baseline Technical Requirements - Translate stakeholder needs into measurable technical requirements. - Use these to guide system design. Example: From the drone example, this may include GPS accuracy of 1.5 meters and battery life of 25 minutes. Decompose the Requirements into Logical and Behavioral Models - Break down system functions and interactions visually. - Use models like flowcharts or state diagrams. Example: "}}, {"id": "Q27", "module": 3, "topic": "Product Life Cycle Phases", "layers": {"L1": "You encounter Product Life Cycle Phases in a real project. Here's how to think about it: What are the Product Life Cycle Phases?", "L2": "Like a product in a store \u2014 goes from idea to shelf to being actively sold to clearance to discontinued.", "L3": "Early phases (concept, development) are where changes are cheapest. Later phases (utilization, support) are where changes are most expensive. Retirement must be planned \u2014 data migration takes real effort.", "L4": "Skipping retirement planning strands data and users. Systems accumulate technical debt during utilization. Support costs are consistently underestimated.", "L5": "What are the Product Life Cycle Phases? The Product Life Cycle Phases describe the stages from idea to deployment of a system or product. They include: Pre-Phase A: Concept Studies - Explore a wide range of ideas and feasible alternatives. - Goal: Understand possible solutions. Phase A: Concept and Technology Development - Develop and select a major system architecture. - Define system-level requirements through analysis and trade studies. Phase B: Preliminary Design - Create a preliminary system design. - Define subsystem responsibilities and interfaces. - Resolve key technology issues. Phase C: Detailed Design - Complete detailed drawings, specifications, and software coding. - Ready for manufacturing or purchase construction. Phase D: System Assembly, Integration, Test, and Launch - Ass"}}, {"id": "Q28", "module": 3, "topic": "Architectural Design", "layers": {"L1": "You encounter Architectural Design in a real project. Here's how to think about it: What is an Architectural Design?", "L2": "Like a city plan showing where roads, water pipes, and power lines go before any building starts.", "L3": "Good architecture makes integration easier because interfaces are defined upfront. It enables parallel work on subsystems. Architectural changes late are catastrophically expensive.", "L4": "Architectural debt is the hardest to pay back \u2014 changing the foundation of a system is much harder than changing the paint. Poor architecture causes late-stage integration failures.", "L5": "What is an Architectural Design? Architectural Design is a high-level description of a system's main elements, their interfaces, and their logical and physical layout."}}, {"id": "Q29", "module": 3, "topic": "ConOps Purpose", "layers": {"L1": "You encounter ConOps Purpose in a real project. Here's how to think about it: - ConOps (Concept of Operations): A document that describes how a system will be used from the user's perspective.", "L2": "ConOps is a restaurant's service manual \u2014 how reservations work, how orders reach the kitchen, how complaints are handled, from the customer's view.", "L3": "ConOps translates stakeholder needs into operational language \u2014 who does what, when, where, how. It catches gaps between user expectations and technical capability before design begins.", "L4": "Without ConOps, developers build based on assumptions about users. Users discover problems at deployment, not design time. ConOps validated only with stakeholders still misses real-world problems.", "L5": "What is ConOps? And why is this important? - ConOps (Concept of Operations): A document that describes how a system will be used from the user's perspective. Importance: - Aligns stakeholders. - Clarifies goals and expectations. - Guides design and development."}}, {"id": "Q30", "module": 3, "topic": "Interface Control Document", "layers": {"L1": "You encounter Interface Control Document in a real project. Here's how to think about it: - ICD (Interface Control Document): Defines how different systems or components interact (data, format, etc).", "L2": "ICD is the rulebook for how trains change drivers at border crossings between countries \u2014 making every interface decision explicit and agreed upon.", "L3": "ICDs prevent integration failures by making every interface decision explicit. When one team changes their component, the ICD tells them what downstream effects to check.", "L4": "Missing ICDs cause 'it works on my machine' failures. Ambiguous ICDs cause integration failures during system integration testing \u2014 the worst possible time.", "L5": "What is ICD used for? - ICD (Interface Control Document): Defines how different systems or components interact (data, format, etc). Used for: - Ensuring compatibility. - Reducing integration problems. - Avoiding integration issues."}}, {"id": "Q31", "module": 3, "topic": "Hashed Feature Design Pattern", "layers": {"L1": "You encounter Hashed Feature Design Pattern in a real project. Here's how to think about it: What is Hashed Feature Design Pattern and how can this be used?", "L2": "Like assigning lockers at a gym using a name tag system \u2014 everyone with the same locker number shares a space, even if they didn't mean to.", "L3": "Hashing solves the memory problem for high-cardinality features (e.g., millions of product IDs) by mapping them to a fixed number of buckets. The hash function is deterministic so the same input always maps to the same bucket. Binary encoding bits: bits = ceil(log2 N) where N = number of categories.", "L4": "Hash collisions: two different categories map to the same bucket, creating noisy features. Hash functions can also be reversible if not using cryptographic hashing, leaking category information.", "L5": "What is Hashed Feature Design Pattern and how can this be used? What problems can this help to solve? - Hashed Feature Design Pattern: A method where features like text or categories are mapped into a fixed-size vector using a hash function. - Use Case: Manage high-cardinality categorical features (e.g., millions of user IDs or product names) into a fixed-size numeric input. Problems it Solves: - Reduces memory usage. - Handles unknown or new categories. - Simplifies high-cardinality features."}}, {"id": "Q32", "module": 3, "topic": "Hashed Feature Disadvantages", "layers": {"L1": "You encounter Hashed Feature Disadvantages in a real project. Here's how to think about it: What are the disadvantages of using Hashed Feature?", "L2": "It's like two different people accidentally getting the same phone number \u2014 calls get mixed up and nobody knows which person the call was really for.", "L3": "Hash collisions mean two different categories land in the same bucket \u2014 the model gets noisy mixed signals. And you can never reverse the hash to see what the original category was.", "L4": "Irreversible: you can never recover the original categories from the hash. Collisions corrupt feature representations. Fixed bucket count limits scalability \u2014 too few buckets means too many collisions.", "L5": "What are the disadvantages of using Hashed Feature? - Collision: Multiple values can map to the same hash, leading to loss of information. - Interpretability: Hard to understand after a hashed feature what categories represent. - Irreversibility: After hashing, you cannot recover the original values (no original categories)."}}, {"id": "Q33", "module": 3, "topic": "Embedding Design Pattern", "layers": {"L1": "You encounter Embedding Design Pattern in a real project. Here's how to think about it: What is the purpose of using Embedding Design Pattern?", "L2": "It's like giving every word in a language its own GPS coordinate \u2014 similar words end up near each other on the map, so the model can navigate meaning.", "L3": "Embeddings are learned representations where geometric distance captures semantic similarity. Words appearing in similar contexts get similar vectors \u2014 'king' and 'queen' cluster together because they appear in similar sentence patterns.", "L4": "Embeddings require large amounts of training data to learn meaningful geometry. Out-of-vocabulary words at inference time have no representation. The geometry may not transfer across languages.", "L5": "What is the purpose of using Embedding Design Pattern? What are the advantages of using embedding? - Purpose: Converts high-dimensional categorical data into low-dimensional dense vectors learned during model training. Advantages: - Captures similarity between categories (e.g., \"cat\" and \"dog\" vectors may be close). - Reduces dimensionality and improves efficiency. - Models used in deep learning models like RNNs and recommender systems."}}, {"id": "Q34", "module": 4, "topic": "ML Data Considerations", "layers": {"L1": "You encounter ML Data Considerations in a real project. Here's how to think about it: What are the considerations of using data for machine learning?", "L2": "ML data is like cooking for guests \u2014 quality ingredients matter, you need enough food, it has to be edible, you can't serve things people are allergic to, and dietary restrictions must be respected.", "L3": "Quality garbage in means garbage out. Quantity must match model complexity. Relevance means training data must match deployment data. Bias in training data gets amplified by the model.", "L4": "Privacy violations expose the organization to legal risk. Label noise degrades model quality silently. Distribution mismatch between training and deployment makes even clean data useless.", "L5": "What are the considerations of using data for machine learning? - Quality: Ensure clean, accurate, and consistent data. - Quantity: Enough data to train the model without overfitting. - Relevance: Data should reflect the problem being solved. - Bias: Avoid biased data that leads to unfair results. - Privacy and Security: Handle sensitive data responsibly. - Labeling: Accurate labels for supervised training."}}, {"id": "Q35", "module": 4, "topic": "Model Selection Baselines", "layers": {"L1": "You encounter Model Selection Baselines in a real project. Here's how to think about it: One of the strategies of model selection is the use of baseline.", "L2": "It's like setting a baseline time for a race \u2014 ZeroR always finishes in the same slow time, Random just guesses, Previous Best is your personal record to beat.", "L3": "ZeroR sets a minimum performance bar \u2014 any useful model must beat it. Random shows whether the model is better than guessing. Previous Best is what you're actually trying to improve on.", "L4": "Wrong baseline choice misleads development. Always predict majority class is a trivially beatable baseline. Previous Best requires careful version tracking to ensure fair comparison.", "L5": "One of the strategies of model selection is the use of baseline. What are the three different baselines and when should you use each of them? 1. Zero Rule (ZeroR) \u2013 Predicts the most frequent class (for classification) or mean (for regression). Use When: You need a simple benchmark to beat. 2. Random Baseline \u2013 Predicts labels at random, usually based on class distribution. Use When: You want to check if your model is better than pure guessing. 3. Previous Best Model \u2013 Uses an older model's performance as a baseline. Use When: You are trying to improve or replace an existing system."}}, {"id": "Q36", "module": 4, "topic": "Data Serialization Formats", "layers": {"L1": "You encounter Data Serialization Formats in a real project. Here's how to think about it: Explain the different formats and how they fit into the characteristics of Data Serialization.", "L2": "Data serialization is how you pack a suitcase for moving. JSON puts everything in labelled zip-lock bags \u2014 easy to see what's inside but takes up space. Protobuf vacuum-seals everything \u2014 compact but you need the key to know what anything is. Pickle is custom packaging that only works between the same kind of moving truck.", "L3": "JSON is human-readable and language-agnostic but verbose and slow to parse. XML is self-describing but verbose. CSV is compact but can't represent nested structures. Protocol Buffers are compact and fast but require schema definitions. Pickle is Python-specific, fast, but unsafe with untrusted data.", "L4": "Using Pickle for cross-language systems is impossible. JSON's parsing overhead makes it unsuitable for high-throughput systems. Protocol Buffers require schema migrations when data models change. CSV can't represent missing values or nested structures.", "L5": "What is Data Serialization? Explain the different formats and how they fit into the characteristics of Data Serialization. - Data Serialization: The process of converting data into a format that can be easily stored or transmitted and later reconstructed. Common Formats & Characteristics: Format | Characteristics JSON | Human-readable, widely used in web APIs, supports nested structures XML | Self-descriptive and hierarchical, but more verbose than JSON CSV | Lightweight, easy to read for tabular data, lacks nesting capability Protocol Buffers | Binary format, fast and compact, good for large-scale data exchange Pickle (Python) | Python-specific, serializes Python objects, not language-independent"}}, {"id": "Q37", "module": 4, "topic": "Row-Major vs Column-Major Format", "layers": {"L1": "You encounter Row-Major vs Column-Major Format in a real project. Here's how to think about it: Explain the differences between Row-Major Versus Column-Major Format.", "L2": "Row-major is reading a book page by page from top to bottom. Column-major is reading one column at a time across pages \u2014 useful if you only care about specific words but need to flip around a lot.", "L3": "Row-major stores consecutive memory addresses for adjacent rows \u2014 fast for reading entire rows (like CSV processing). Column-major stores consecutive addresses for adjacent columns \u2014 fast for reading entire columns (like aggregations). The storage order determines cache performance for different access patterns.", "L4": "Using row-major storage for column-heavy analytics is slow \u2014 you're jumping around memory. Pandas uses row-major by default, which is why column-wise operations on large DataFrames are slower than expected.", "L5": "Explain the differences between Row-Major Versus Column-Major Format. Aspect | Row-Major Format | Column-Major Format Storage | Stores row by row (e.g., CSV) | Stores column by column (e.g., Parquet, ORC) Languages | Used by C, Python (NumPy default) | Used by Fortran, R Use Case | Better for row-wise operations | Better for column-wise operations (e.g., analytics)"}}, {"id": "Q38", "module": 4, "topic": "Three Data Models", "layers": {"L1": "You encounter Three Data Models in a real project. Here's how to think about it: What are the 3 different types of data models?", "L2": "Hierarchical is a family tree \u2014 parents above children. Relational is a spreadsheet with labeled columns. Graph is a social network \u2014 people as dots, friendships as lines.", "L3": "Hierarchical model organizes data in trees \u2014 fast for one-to-many relationships, rigid structure. Relational model uses tables with foreign keys \u2014 flexible, SQL, great for many-to-many. Graph model uses nodes and edges \u2014 excels at relationships and traversals.", "L4": "Hierarchical can't easily represent many-to-many relationships. Relational models become slow for deep joins. Graph models require specialized query languages and can use enormous storage for sparse graphs.", "L5": "What are the 3 different types of data models? Use examples to explain each of them. 1. Hierarchical Model \u2013 Data is organized in a tree-like structure. Example: XML files, file system directory. 2. Relational Model \u2013 Data is stored in tables with rows and columns. Example: SQL databases like MySQL, PostgreSQL. 3. Graph Model \u2013 Data is stored in nodes and edges. Example: Social networks, Neo4j databases."}}, {"id": "Q39", "module": 4, "topic": "Structured vs Unstructured Data", "layers": {"L1": "You encounter Structured vs Unstructured Data in a real project. Here's how to think about it: What are the differences between Structured and Unstructured Data?", "L2": "Structured data is a library card catalog \u2014 every book has the same fields in the same order. Unstructured data is a library of all human creative output \u2014 videos, paintings, manuscripts, recordings, none organized the same way.", "L3": "Structured data has a predefined schema \u2014 easy to query with SQL, indexes work well. Unstructured data has no schema \u2014 requires ML (CV, NLP) to extract meaning. Most enterprise data (80%+) is unstructured.", "L4": "Treating unstructured data as structured fails \u2014 there's no schema to query. Structured data's schema can become a straightjacket when data doesn't fit neatly into predefined columns. Both require different analysis tools.", "L5": "What are the differences between Structured and Unstructured Data? Example? Structured Data | Unstructured Data Organized in tables or schemas | No fixed format or schema Easy to query (SQL) | Harder to search/analyze Example: Customer databases | Example: Emails, images, videos"}}, {"id": "Q40", "module": 4, "topic": "Data Warehouse vs Data Lake", "layers": {"L1": "You encounter Data Warehouse vs Data Lake in a real project. Here's how to think about it: What is Data Warehouse and Data Lake?", "L2": "A data warehouse is a library with curated, organized books organized by subject. A data lake is the author's raw manuscripts, emails, voice recordings, and everything else \u2014 organized by who knows what, useful if you're willing to search through everything.", "L3": "Data warehouse stores structured, processed data optimized for analytical queries \u2014 OLAP workloads benefit from columnar storage and pre-aggregation. Data lake stores raw data at any scale \u2014 structured, semi-structured, unstructured \u2014 enabling ML on diverse data sources.", "L4": "Data lakes without governance become data swamps \u2014 raw data with no quality control, impossible to find anything useful. Data warehouses require expensive preprocessing before analysis. Both need clear governance or they become liabilities.", "L5": "What is Data Warehouse and Data Lake? - Data Warehouse: Centralized storage for structured data optimized for analysis and reporting. Example: Used in BI dashboards. - Data Lake: Storage for raw, unstructured, semi-structured data at scale. Example: Used for big data and machine learning."}}, {"id": "Q41", "module": 4, "topic": "Transactional Processing and ACID", "layers": {"L1": "You encounter Transactional Processing and ACID in a real project. Here's how to think about it: What is Transactional Processing?", "L2": "Transactional processing is a bank teller making one withdrawal at a time \u2014 immediate, consistent, nothing is ever half-updated. ACID is what ensures a $100 withdrawal doesn't result in -$20 or $80 disappearing.", "L3": "Atomicity ensures partial transactions don't exist. Consistency ensures the database rules are never violated. Isolation means concurrent transactions don't see each other's intermediate states. Durability means committed transactions survive crashes.", "L4": "ACID trades off performance \u2014 full isolation is expensive. Weaker isolation levels (read uncommitted) allow dirty reads but are faster. Not all systems need full ACID \u2014 analytical systems (OLAP) often sacrifice consistency for speed.", "L5": "What is Transactional Processing? What are ACID? - Transactional Processing: Handles day-to-day operations (insert, update, delete) in databases. Example: Banking systems. - ACID properties of transactions: - A \u2013 Atomicity: All-or-nothing. - C \u2013 Consistency: Keeps database rules valid. - I \u2013 Isolation: Transactions are independent. - D \u2013 Durability: Changes are saved permanently."}}, {"id": "Q42", "module": 4, "topic": "Analytical Processing", "layers": {"L1": "You encounter Analytical Processing in a real project. Here's how to think about it: - Analytical Processing (OLAP): Used to analyze large volumes of historical data for decision-making.", "L2": "Analytical processing is reading a historian's synthesis of decades of events \u2014 slow to produce, long views, patterns across time.
